<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Interactivo - Bloque IV Tema 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">TEST BLOQUE IV - TEMA 01</h1>
            <p class="text-blue-100 mt-2">Sistemas Operativos y Administración</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-blue-400 h-2 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-6">
            <!-- Question Section -->
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-6 text-sm font-medium text-slate-500">
                    <span id="question-number">Pregunta 1 de 30</span>
                    <span id="score-live">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-lg font-semibold text-slate-800 mb-6">
                    <!-- Cargando... -->
                </div>

                <div id="options-container" class="space-y-3">
                    <!-- Opciones aquí -->
                </div>

                <!-- Navigation -->
                <div class="flex justify-between mt-8 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="px-6 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 disabled:opacity-30">
                        Anterior
                    </button>
                    <button id="next-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50">
                        Siguiente
                    </button>
                </div>
            </div>

            <!-- Results Section (Hidden by default) -->
            <div id="results-ui" class="hidden text-center py-8">
                <h2 class="text-3xl font-bold text-slate-800 mb-4">¡Test Finalizado!</h2>
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="p-4 bg-green-50 rounded-lg">
                        <div id="res-correct" class="text-2xl font-bold text-green-600">0</div>
                        <div class="text-xs text-green-700 uppercase font-bold">Correctas</div>
                    </div>
                    <div class="p-4 bg-red-50 rounded-lg">
                        <div id="res-incorrect" class="text-2xl font-bold text-red-600">0</div>
                        <div class="text-xs text-red-700 uppercase font-bold">Incorrectas</div>
                    </div>
                    <div class="p-4 bg-yellow-50 rounded-lg">
                        <div id="res-empty" class="text-2xl font-bold text-yellow-600">0</div>
                        <div class="text-xs text-yellow-700 uppercase font-bold">Sin Responder</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition-colors">
                    Reiniciar Test
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. En el ámbito de los sistemas operativos de Microsoft, la extensión que permite mantener actualizado el sistema operativo es:", a: ["Microsoft Edge", "Windows Defender", "Windows Online", "Windows Update"], c: 3 },
            { q: "2. ¿Indique qué ejecutaría en la línea de comandos de Windows para eliminar una dll del registro de Windows?", a: ["regrm <nombre-fichero.dll>", "regdel <nombre-fichero.dll>", "regerase <nombre-fichero.dll>", "regsvr32 /u <nombre-fichero.dll>"], c: 3 },
            { q: "3. En Debian GNU/Linux, ¿cómo se puede obtener la versión de Linux instalada?", a: ["lsb_release -I", "lsb_release -x", "lsb_release -a", "lsb_release -m"], c: 2 },
            { q: "4. En un sistema Linux, queremos dar permisos de escritura al propietario del archivo y quitarle permisos de ejecución al grupo que pertenece. ¿Cuál ejecutaremos?", a: ["chmod u+w g-x archivo", "chmod 655 archivo", "chmod 755 archivo", "chmod a=rwx archivo"], c: 0 },
            { q: "5. Un administrador desea saber todos los procesos asociados a httpd que están en ejecución:", a: ["ps-U emi -u httpd.", "ps -ef | grep httpd.", "ps -ef ppid='httpd'", "ps-uf httpd."], c: 1 },
            { q: "6. Tras instalar MySQL (puerto por defecto), ¿qué comando devolverá la lista de conexiones?", a: ["nslookup grep 3306", "ps -ef | grep mysql", "netstat -anp | grep 5432", "netstat -anp | grep 3306"], c: 3 },
            { q: "7. ¿Qué paquete en Linux equivalente al htop permite mostrar información de E/S del disco?", a: ["uisp", "iotop", "disk-status.", "zzuf"], c: 1 },
            { q: "8. Sobre PowerShell Core, indique la afirmación correcta:", a: ["No interactúa con IIS o Exchange", "Es open source y está disponible para Linux y macOS", "No permite apagar o detener servicios", "Devuelve texto, no objetos"], c: 1 },
            { q: "9. Comando correcto para verificar si en Linux tenemos un servidor SSH instalado:", a: ["dpkg -1 | grep sshd", "dpkg -1 more ssh", "dpkg -l | grep ssh", "dpkg -1 | less sshd"], c: 2 },
            { q: "10. Instrucción que muestra lista de paquetes con versión, arquitectura y descripción breve:", a: ["popularity-contest", "disk-status", "dpkg -l", "installed-pkg"], c: 2 },
            { q: "11. El comando de Linux que permite conocer la ruta completa de un comando es:", a: ["Which", "Tee", "Catch", "Apropos"], c: 0 },
            { q: "12. ¿Cuál es la herramienta que nos permite editar el registro de Windows?", a: ["simbolo del sistema", "regedit", "edit", "cmd"], c: 1 },
            { q: "13. Comando que muestra espacio en disco utilizado y disponible en sistemas de archivos Linux:", a: ["btrfs fi df/device/", "dpkg -1", "df command", "du command"], c: 2 },
            { q: "14. Advanced Package Tool (APT) es un sistema creado por el proyecto:", a: ["Ubuntu", "Fedora", "Red Hat", "Debian"], c: 3 },
            { q: "15. En la estructura lógica de Active Directory, las unidades organizativas son:", a: ["Tipo de objeto contenedor para organizar otros objetos", "Dominios agrupados jerárquicamente", "Ninguna es correcta", "Objetos para agrupar según la red de la organización"], c: 0 },
            { q: "16. En Linux, ¿cuál es la finalidad del comando modprobe?", a: ["Test unitarios sobre código C", "Añade módulos pero no los elimina", "Equivalente a pvcreate", "Añade o elimina módulos del kernel de Linux"], c: 3 },
            { q: "17. ¿Con qué comando se comprueba la integridad de un sistema de ficheros ext3?", a: ["fix.ext3", "e2fsck", "chkdsk", "melt"], c: 1 },
            { q: "18. Directorio de Unix que almacena la información de los dispositivos de E/S:", a: ["/dev", "/bin", "/tmp", "/etc"], c: 0 },
            { q: "19. ¿Cuál de los siguientes es un estándar para el servicio de directorio?", a: ["LPR", "LDAP", "Kerberos", "URL"], c: 1 },
            { q: "20. En Linux, el directorio /boot:", a: ["Directorio del superusuario root", "Ejecutables y archivos necesarios para el arranque", "Almacena archivos de configuración", "Información de procesos y aplicaciones en ejecución"], c: 1 },
            { q: "21. Estructura jerárquica de Active Directory (de más a menos significativa):", a: ["UO, bosque, árbol, dominio", "Bosque, árbol, dominio, UO", "UO, dominio, bosque, árbol", "Dominio, bosque, árbol, UO"], c: 1 },
            { q: "22. Comando que muestra espacio en disco utilizado por archivos y subdirectorios:", a: ["disk-status", "btrfs fi df/device/", "df command", "du command"], c: 3 },
            { q: "23. Comprobar que el servidor postgres está ejecutándose usando el usuario postgres:", a: ["ps -U postgres -u postgres u.", "ps -ef postgres.", "ps -v server.", "ps--process-postgres."], c: 0 },
            { q: "24. Comando correcto para instalar el servidor SSH:", a: ["sudo apt install sshd", "sudo dpkg -U ssh-server", "sudo apt-get install openssh-server", "sudo apt-get install ssh"], c: 2 },
            { q: "25. ¿En qué tipos de partición podemos instalar nuestro sistema operativo?", a: ["Extendida y primaria", "Lógica", "Primaria y lógica", "Primaria"], c: 2 },
            { q: "26. Espacio en disco para un sistema de archivos basado en btrfs:", a: ["du command", "dpkg -1", "df command", "btrfs fi df/device/"], c: 3 },
            { q: "27. ¿Qué comando permite cambiar el sistema al nivel de ejecución 3?", a: ["init 3", "inittab 3", "switch root", "rlevel 3"], c: 0 },
            { q: "28. Programa de Windows para buscar instalaciones de NT, 2000 y XP:", a: ["regedit", "bootcfg", "msconfig", "cmd"], c: 1 },
            { q: "29. Comando Linux que muestra la versión del kernel usado:", a: ["uname -m", "cat /etc/kernel", "cat /pro/kernel", "uname -r"], c: 3 },
            { q: "30. ¿Qué comando permite ver las últimas 5 líneas del archivo informe.txt?", a: ["more fichero.txt", "cat informe.txt", "head-5 informe.txt", "tail -5 informe.txt"], c: 3 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers')) || {};
        let score = 0;

        const qText = document.getElementById('question-text');
        const optionsBox = document.getElementById('options-container');
        const qNum = document.getElementById('question-number');
        const liveScore = document.getElementById('score-live');
        const progressBar = document.getElementById('progress-bar');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function loadQuestion() {
            const data = quizData[currentIdx];
            qNum.innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            qText.innerText = data.q;
            progressBar.style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            optionsBox.innerHTML = '';
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-lg border-2 border-slate-200 option-transition hover:border-blue-300 hover:bg-blue-50 font-medium';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                // Si ya fue respondida
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) btn.classList.add('correct');
                    else if (i === answers[currentIdx]) btn.classList.add('incorrect');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                
                optionsBox.appendChild(btn);
            });

            prevBtn.disabled = currentIdx === 0;
            nextBtn.innerText = currentIdx === quizData.length - 1 ? "Ver Resultados" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            liveScore.innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) {
                showResults();
            } else {
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });

            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        prevBtn.onclick = () => changeQuestion(-1);
        nextBtn.onclick = () => changeQuestion(1);

        // Iniciar
        loadQuestion();
    </script>
</body>
</html>
