<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Interactivo - Bloque IV Tema 05</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="bg-slate-900 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase tracking-tight">TEST BLOQUE IV - TEMA 05 Seguridad Informática y Criptografía</h1>
            <p class="text-rose-400 mt-2 font-medium">Seguridad Informática y Criptografía</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-rose-500 h-2 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-6">
            <!-- Quiz UI -->
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-6 text-sm font-bold text-slate-500 uppercase tracking-widest">
                    <span id="question-number">Pregunta 1 de 30</span>
                    <span id="score-live">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-lg font-semibold text-slate-800 mb-6 leading-relaxed"></div>

                <div id="options-container" class="space-y-3"></div>

                <!-- Navigation -->
                <div class="flex justify-between mt-8 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="px-6 py-2 rounded-lg font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-30 transition-colors">
                        Anterior
                    </button>
                    <button id="next-btn" class="px-6 py-2 bg-rose-600 text-white rounded-lg font-bold hover:bg-rose-700 disabled:opacity-50 transition-all shadow-md active:transform active:scale-95">
                        Siguiente
                    </button>
                </div>
            </div>

            <!-- Results UI -->
            <div id="results-ui" class="hidden text-center py-8">
                <h2 class="text-3xl font-black text-slate-900 mb-2">RESULTADOS</h2>
                <p class="text-slate-500 mb-8 font-medium">Evaluación de Seguridad Informática</p>
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="p-4 bg-green-50 rounded-xl border border-green-100 shadow-sm">
                        <div id="res-correct" class="text-3xl font-black text-green-600">0</div>
                        <div class="text-[10px] text-green-700 uppercase font-black tracking-tighter">Correctas</div>
                    </div>
                    <div class="p-4 bg-red-50 rounded-xl border border-red-100 shadow-sm">
                        <div id="res-incorrect" class="text-3xl font-black text-red-600">0</div>
                        <div class="text-[10px] text-red-700 uppercase font-black tracking-tighter">Incorrectas</div>
                    </div>
                    <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 shadow-sm">
                        <div id="res-empty" class="text-3xl font-black text-amber-600">0</div>
                        <div class="text-[10px] text-amber-700 uppercase font-black tracking-tighter">Omitidas</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black hover:bg-black transition-all shadow-lg uppercase tracking-widest">
                    Reiniciar Evaluación
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. En relación a las dimensiones de seguridad y sus posibles amenazas, indique la afirmación correcta:", a: ["La integridad se ve afectada por la intercepción.", "La confidencialidad se ve afectada por la modificación.", "La confidencialidad se ve afectada por la fabricación.", "La disponibilidad se ve afectada por la interrupción."], c: 3 },
            { q: "2. Dentro de la criptografía de clave pública se encuentra la FIRMA DIGITAL, en la cual la persona firmante de un documento:", a: ["Cifra el hash con la clave privada del receptor.", "Cifra el hash con la clave privada del firmante.", "Cifra el hash con la clave pública del firmante.", "Cifra el hash con la clave pública del receptor."], c: 1 },
            { q: "3. Indique la afirmación INCORRECTA relacionada con la seguridad informática:", a: ["Impacto: consecuencia de la materialización de una amenaza.", "Ataque: Evento que puede originar un incidente produciendo daños.", "Activo: Componente susceptible de ser atacado.", "Vulnerabilidad: posibilidad de ocurrencia de una amenaza."], c: 3 },
            { q: "4. En el contexto de criptografía, ¿qué es la esteganografía?", a: ["Cifrado mediante algoritmos de flujo.", "Ocultar mensajes dentro de otros objetos para que no se perciba su existencia.", "Uso de claves asimétricas de larga longitud.", "Cifrado de archivos mediante técnicas de transposición."], c: 1 },
            { q: "5. ¿Cuál de los siguientes protocolos de seguridad de capa de transporte es el sucesor de SSL?", a: ["SSH", "HTTPS", "TLS", "IPsec"], c: 2 },
            { q: "6. El algoritmo AES (Advanced Encryption Standard) utiliza bloques de:", a: ["64 bits", "128 bits", "256 bits", "512 bits"], c: 1 },
            { q: "7. ¿Qué tipo de ataque consiste en sobrecargar un servidor con múltiples peticiones para dejarlo inoperativo?", a: ["Phishing", "Spoofing", "DoS / DDoS", "Man-in-the-middle"], c: 2 },
            { q: "8. En una infraestructura de clave pública (PKI), ¿quién se encarga de emitir y firmar los certificados?", a: ["RA (Autoridad de Registro)", "VA (Autoridad de Validación)", "CA (Autoridad de Certificación)", "Cualquier usuario con clave privada"], c: 2 },
            { q: "9. ¿Cuál de las siguientes funciones hash se considera actualmente insegura debido a colisiones?", a: ["SHA-256", "SHA-3", "MD5", "SHA-512"], c: 2 },
            { q: "10. El protocolo Kerberos utiliza un tercero de confianza denominado:", a: ["KDC (Key Distribution Center)", "CA (Certificate Authority)", "Proxy Server", "Gateway Security"], c: 0 },
            { q: "11. ¿Qué longitud de clave utiliza habitualmente el algoritmo DES?", a: ["128 bits", "64 bits (56 efectivos)", "256 bits", "1024 bits"], c: 1 },
            { q: "12. La técnica de 'Phishing' tiene como objetivo principal:", a: ["Bloquear el acceso a la red.", "Obtener información confidencial suplantando una entidad de confianza.", "Infectar el sector de arranque del disco duro.", "Cifrar los archivos del usuario para pedir un rescate."], c: 1 },
            { q: "13. ¿Cuál es la principal característica de los algoritmos de clave simétrica?", a: ["Usan una clave pública y otra privada.", "Usan la misma clave para cifrar y descifrar.", "No necesitan clave para descifrar.", "Solo permiten cifrar textos cortos."], c: 1 },
            { q: "14. El ataque 'Man-in-the-Middle' (MitM) afecta principalmente a la:", a: ["Confidencialidad e Integridad.", "Disponibilidad.", "No Repudio.", "Solo a la capacidad de almacenamiento."], c: 0 },
            { q: "15. ¿Qué comando Linux permitiría cambiar la contraseña de un usuario?", a: ["chpass", "passwd", "userpass", "set-password"], c: 1 },
            { q: "16. En criptografía asimétrica, para enviar un mensaje CONFIDENCIAL a 'B', 'A' debe cifrarlo con:", a: ["La clave privada de A.", "La clave pública de A.", "La clave privada de B.", "La clave pública de B."], c: 3 },
            { q: "17. ¿Qué es un 'Rootkit'?", a: ["Un virus que borra el registro.", "Software diseñado para ocultar procesos o programas maliciosos con privilegios de root.", "Un antivirus de código abierto.", "Un gestor de particiones."], c: 1 },
            { q: "18. El estándar X.509 define el formato de:", a: ["Las políticas de contraseñas.", "Los certificados digitales.", "Los protocolos de enrutamiento.", "Los cables de red."], c: 1 },
            { q: "19. ¿Cuál de los siguientes es un algoritmo asimétrico basado en la dificultad de factorizar números primos grandes?", a: ["AES", "DES", "RSA", "Blowfish"], c: 2 },
            { q: "20. Un sistema IDS (Intrusion Detection System) se diferencia de un IPS en que:", a: ["El IDS solo detecta y alerta, mientras que el IPS puede actuar para detener el ataque.", "El IDS es hardware y el IPS es software.", "El IDS cifra y el IPS descifra.", "No hay diferencia real."], c: 0 },
            { q: "21. El concepto de 'Defensa en Profundidad' se refiere a:", a: ["Cifrar los datos con claves muy largas.", "Colocar los servidores en sótanos protegidos.", "Utilizar múltiples capas de seguridad de distintos tipos.", "Tener copias de seguridad en la nube."], c: 2 },
            { q: "22. ¿Qué significa 'Ransomware'?", a: ["Publicidad no deseada.", "Software malicioso que secuestra datos y pide un rescate.", "Un escáner de puertos.", "Un programa para recuperar archivos borrados."], c: 1 },
            { q: "23. En seguridad, el 'Principio del menor privilegio' dicta que:", a: ["Los usuarios deben tener solo los permisos necesarios para realizar su trabajo.", "Solo el administrador debe tener contraseña.", "Todos los usuarios deben ser invitados.", "No se deben usar contraseñas."], c: 0 },
            { q: "24. El protocolo IPsec trabaja en la capa de:", a: ["Aplicación.", "Transporte.", "Red.", "Enlace de datos."], c: 2 },
            { q: "25. ¿Qué es un 'Zero-day exploit'?", a: ["Un ataque que dura un día.", "Un ataque que aprovecha una vulnerabilidad desconocida para el fabricante.", "Un virus que se activa el día 0 de cada mes.", "Una técnica de cifrado antigua."], c: 1 },
            { q: "26. ¿Cuál de los siguientes NO es un factor de autenticación?", a: ["Algo que sabes (contraseña).", "Algo que tienes (token).", "Algo que eres (huella).", "Algo que compras."], c: 3 },
            { q: "27. El protocolo de intercambio de claves Diffie-Hellman es:", a: ["Simétrico.", "Asimétrico.", "De flujo.", "Un algoritmo de hash."], c: 1 },
            { q: "28. Un cortafuegos (Firewall) de capa de aplicación también se conoce como:", a: ["Proxy.", "Switch.", "Hub.", "Repetidor."], c: 0 },
            { q: "29. ¿Qué es el 'Salting' en el almacenamiento de contraseñas?", a: ["Borrar la contraseña cada mes.", "Añadir datos aleatorios a la contraseña antes de aplicar el hash para evitar tablas arcoíris.", "Cifrar el disco duro completo.", "Usar solo letras mayúsculas."], c: 1 },
            { q: "30. Señale la definición correcta de 'Hoax':", a: ["Virus que se replica por red.", "Correo que alerta de un falso problema para causar confusión o engaño.", "Un tipo de troyano bancario.", "Software que espía las pulsaciones del teclado."], c: 1 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers_T5')) || {};

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-number').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl border-2 border-slate-200 option-transition hover:border-rose-400 hover:bg-rose-50 font-medium text-slate-700';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) btn.classList.add('correct');
                    else if (i === answers[currentIdx]) btn.classList.add('incorrect');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? "Ver Resultados" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers_T5', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            document.getElementById('score-live').innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) showResults();
            else if (currentIdx < 0) currentIdx = 0;
            else loadQuestion();
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });

            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers_T5');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        document.getElementById('prev-btn').onclick = () => changeQuestion(-1);
        document.getElementById('next-btn').onclick = () => changeQuestion(1);

        loadQuestion();
    </script>
</body>
</html>
