<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Supuesto II — TAI-L 2024</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0c0f14;--card:#161a23;--card-hover:#1c2130;--border:#2a2f3d;
--text:#e2e4e9;--text-dim:#8b90a0;--accent:#4fc3f7;--accent-glow:rgba(79,195,247,.15);
--correct:#66bb6a;--correct-bg:rgba(102,187,106,.12);--correct-border:rgba(102,187,106,.4);
--wrong:#ef5350;--wrong-bg:rgba(239,83,80,.12);--wrong-border:rgba(239,83,80,.4);
--skip:#ffa726;--skip-bg:rgba(255,167,38,.1);
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;line-height:1.6}
.noise{position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.container{max-width:820px;margin:0 auto;padding:24px 16px 80px}
header{text-align:center;padding:48px 0 32px;position:relative}
header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--accent),#b388ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:.95rem;color:var(--text-dim);margin-top:8px;font-weight:300}

.scoreboard{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:28px 0;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:14px}
.score-item{text-align:center}
.score-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700}
.score-val.v-correct{color:var(--correct)}.score-val.v-wrong{color:var(--wrong)}.score-val.v-skip{color:var(--skip)}.score-val.v-total{color:var(--accent)}
.score-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-top:2px}

.progress-wrap{height:6px;background:var(--card);border-radius:3px;margin-bottom:32px;overflow:hidden;border:1px solid var(--border)}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#b388ff);transition:width .4s ease}

.question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;margin-bottom:16px;transition:border-color .3s}
.question-card.answered-correct{border-color:var(--correct-border);background:var(--correct-bg)}
.question-card.answered-wrong{border-color:var(--wrong-border);background:var(--wrong-bg)}
.q-header{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.q-num{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);background:var(--accent-glow);padding:4px 10px;border-radius:6px;flex-shrink:0}
.q-text{font-size:.95rem;font-weight:400;line-height:1.55}

.options{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--text);transition:all .2s;line-height:1.45}
.opt-btn:hover:not(.disabled){border-color:var(--accent);background:var(--accent-glow)}
.opt-btn .letter{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);flex-shrink:0;width:22px}
.opt-btn.selected-correct{border-color:var(--correct);background:var(--correct-bg);color:var(--correct)}
.opt-btn.selected-wrong{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong)}
.opt-btn.reveal-correct{border-color:var(--correct-border);background:var(--correct-bg)}
.opt-btn.reveal-correct .letter{color:var(--correct)}
.opt-btn.disabled{cursor:default;opacity:.7}
.opt-btn.disabled:hover{border-color:var(--border);background:var(--bg)}
.opt-btn.selected-correct.disabled,.opt-btn.selected-wrong.disabled,.opt-btn.reveal-correct.disabled{opacity:1}

.feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600;display:none}
.feedback.show{display:block}
.feedback.fb-correct{background:var(--correct-bg);color:var(--correct);border:1px solid var(--correct-border)}
.feedback.fb-wrong{background:var(--wrong-bg);color:var(--wrong);border:1px solid var(--wrong-border)}

.final-results{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px 28px;text-align:center;margin-top:40px;display:none}
.final-results.show{display:block}
.final-results h2{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.final-pct{font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:700;margin:16px 0}
.final-pct.grade-good{color:var(--correct)}.final-pct.grade-mid{color:var(--skip)}.final-pct.grade-bad{color:var(--wrong)}
.final-detail{color:var(--text-dim);font-size:.9rem;line-height:1.7}

.btn-reset{display:inline-block;margin-top:24px;padding:12px 32px;background:linear-gradient(135deg,var(--accent),#b388ff);color:#0c0f14;font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;border:none;border-radius:10px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-reset:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,195,247,.3)}

.nav-dots{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;justify-content:center}
.nav-dot{width:28px;height:28px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.65rem;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--bg);color:var(--text-dim);cursor:pointer;transition:all .2s}
.nav-dot:hover{border-color:var(--accent);color:var(--accent)}
.nav-dot.dot-correct{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct)}
.nav-dot.dot-wrong{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong)}

@media(max-width:600px){
.container{padding:16px 12px 60px}
.scoreboard{grid-template-columns:repeat(2,1fr);gap:8px;padding:14px}
.question-card{padding:20px 16px}
.q-text{font-size:.88rem}
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">
<header>
<h1>Test Supuesto II — TAI-L 2024</h1>
<p class="subtitle">Redes, Sistemas, Seguridad y Administración · 50 preguntas</p>
</header>

<div class="scoreboard">
<div class="score-item"><div class="score-val v-correct" id="s-correct">0</div><div class="score-label">Correctas</div></div>
<div class="score-item"><div class="score-val v-wrong" id="s-wrong">0</div><div class="score-label">Incorrectas</div></div>
<div class="score-item"><div class="score-val v-skip" id="s-skip">50</div><div class="score-label">Sin contestar</div></div>
<div class="score-item"><div class="score-val v-total" id="s-pct">0%</div><div class="score-label">Acierto</div></div>
</div>

<div class="progress-wrap"><div class="progress-bar" id="progress" style="width:0%"></div></div>

<div class="nav-dots" id="nav-dots"></div>

<div id="questions-container"></div>

<div class="final-results" id="final-results">
<h2>Resultado Final</h2>
<div class="final-pct" id="final-pct"></div>
<div class="final-detail" id="final-detail"></div>
<button class="btn-reset" onclick="resetTest()">Repetir Test</button>
</div>
</div>

<script>
const questions = [
// === 20 preguntas originales del Supuesto II ===
{q:"¿Cuántas direcciones hay disponibles para hosts en la subred del organismo? (Red 10.9.0.0/16 dividida en 16 subredes, última subred)",opts:["4094","65534","4096","65536"],ans:0},
{q:"Al arrancar el servidor, aparecen errores en la partición sda8. ¿Qué comando repara automáticamente los errores en el sistema de ficheros?",opts:["mount –T /dev/sda8","fsck -y /dev/sda8","fsck -m /dev/sda8","checkdisk /dev/sda8"],ans:1},
{q:"El CCN recomienda sobre abrir o no el puerto 80 en un servidor web expuesto con HTTPS:",opts:["Exhibir web estática en puerto 80","Cambiar HTTPS al 8892","Usar analizador de cabeceras HTTP en puerto 80","Configurar redirección automática HTTP a HTTPS en puerto TCP/80"],ans:3},
{q:"Un intruso entró al CPD esperando agazapado detrás de alguien autorizado. Este incidente de ingeniería social se conoce como:",opts:["Tailgating o piggybacking","Quid pro quo","Pretexto","Disrupción"],ans:0},
{q:"Para interconectar una red coaxial de CCTV a la red local Ethernet, ¿qué dispositivo de red usaría?",opts:["Cortafuegos (firewall)","Pasarela (gateway)","Conmutador (switch)","Repetidor (repeater)"],ans:1},
{q:"DNS y FTP seguro se diferencian en el modelo TCP/IP en que:",opts:["DNS es protocolo de usuario y FTP de soporte","DNS es siempre orientado a conexión y FTP no","No hay diferencia, ambos son de soporte","FTP es protocolo de usuario y DNS de soporte"],ans:3},
{q:"El comando 'switchport access vlan 1' en un switch Cisco permite:",opts:["Asignar un puerto a la VLAN 1","Asignar el puerto 1 del switch a la VLAN actual","Visualizar hosts de la VLAN 1","Asignar todos los hosts a la VLAN 1"],ans:0},
{q:"La base de datos se ha corrompido y los usuarios no pueden acceder. ¿A qué dimensiones de seguridad afecta?",opts:["Disponibilidad e integridad","Confidencialidad","Solo disponibilidad","Trazabilidad"],ans:0},
{q:"Al conectar un dispositivo a Gigabit Ethernet, parpadea una luz naranja. ¿A qué se debe?",opts:["VLAN mal configurada","La tarjeta transmite a menor velocidad que la red","Tarjeta estropeada","Cable coaxial incompatible"],ans:1},
{q:"¿Con qué comando puede saber qué versión del kernel tiene Ubuntu?",opts:["sudo dpkg -i linux*.deb","uname -r","uname -o","kexec -l"],ans:1},
{q:"Sobre SFTP y FTPS, indique la afirmación INCORRECTA:",opts:["SFTP usa puerto 22 de SSH y FTPS usa el de SSL/TLS","SFTP usa autenticación con clave pública y FTPS con usuario/contraseña","FTPS usa dos puertos y SFTP uno","FTPS no tiene comandos para manipular directorios y SFTP sí"],ans:3},
{q:"¿Cómo define el CCN una APT (Advanced Persistent Threat)?",opts:["Un ransomware como WannaCry","Suplantación con escalada de privilegios","Ataque selectivo de ciberespionaje/cibersabotaje bajo dirección de un país","Ataque masivo por un fallo no advertido"],ans:2},
{q:"¿Qué protocolos para servicios pueden utilizarse con Kubernetes?",opts:["SCTP, TCP (por defecto) y UDP","HTTP (por defecto), HTTPS y FTP","SSH, SFTP (por defecto) y UDP","UDP (por defecto) y TCP"],ans:0},
{q:"¿En qué consiste el enrolamiento de móviles?",opts:["Emparejar en el MDM cada usuario con su móvil","Dar de alta todos los dispositivos en una BD","Insertar la SIM correspondiente","Formatear a fábrica los dispositivos"],ans:0},
{q:"¿Por qué NO se aconseja usar climatización derivada del edificio para el CPD?",opts:["Humedad recomendada para CPD es menor","Temperatura recomendada para CPD es mayor","Filtro de personas es más sensible que para CPD","Aire del CPD debe provenir del techo"],ans:0},
{q:"Un hash de comprobación junto a la descarga de una herramienta del CCN-CERT es:",opts:["Medida antimalware que sanitiza el fichero","Medida para asegurar la integridad del fichero descargado","Firma del CCN como autoridad de certificación","Firma de la página web para evitar manipulación"],ans:1},
{q:"VoIP con SIP se congela al llamar fuera del organismo pero no internamente. ¿Por qué?",opts:["Uso incorrecto de códecs","La salida a Internet emplea NAT","Tráfico interceptado en cortafuegos","CPU insuficiente del ordenador"],ans:1},
{q:"Sobre POP3 e IMAP, ¿cuál es INCORRECTA?",opts:["Con IMAP los mensajes se almacenan en servidor remoto","POP3 solo admite sincronización unidireccional","Con IMAP el correo se almacena en servidor hasta eliminación","Con POP3 la organización en carpetas se replica entre dispositivos"],ans:3},
{q:"Para saber qué usuarios acceden a MySQL y desde qué host, ejecutará:",opts:["SELECT * FROM all_users","mysql> SELECT user FROM mysql.user","mysql> SELECT user,host FROM mysql.user","sudo mysql -u root -p"],ans:2},
{q:"Para aplicar GPOs al grupo Profesores con Directorio Activo, primero se debe definir:",opts:["Una Unidad Organizativa (OU)","Las ACLs de las GPO","Un nuevo bosque de Directorio Activo","Relaciones de confianza entre dominios"],ans:0},

// === 5 preguntas de reserva del Supuesto II ===
{q:"Para cambiar el mensaje HELO en Postfix en todos los servidores SMTP, ¿cómo lo haría?",opts:["Editar $client en /etc/postfix/main.cf y reiniciar","Ejecutar EHLO -name CORREOBIBLIOTECA en consola","Editar smtp_helo en /etc/postfix/master.cf y reiniciar","Editar $helo_name en /etc/postfix/main.cf y reiniciar"],ans:3},
{q:"Para WiFi con WPA3-Enterprise, ¿qué se necesita para acceder?",opts:["Contraseña de 64 bits","Contraseña de 128 bits","Servidor RADIUS o solución EAP-TLS","Contraseña de 192 bits con GMCP-256"],ans:2},
{q:"Para crear la tabla ProfesoresIngles en MySQL con id, nombre y apellidos, el comando correcto es:",opts:["CREATE TABLE ProfesoresIngles (id INT NOT NULL PRIMARY KEY AUTO_INCREMENT, nombre VARCHAR(30), apellido1 VARCHAR(30), apellido2 VARCHAR(30));","CREATE TABLE ProfesoresIngles KEY id, nombre, apellidos;","CREAR TABLA ProfesoresIngles KEY apellidos, nombre;","CREATE TABLE ProfesoresIngles (nombre, apellido);"],ans:0},
{q:"Para comprobar que Nagios está configurado correctamente, utilizará:",opts:["nagios –v /usr/local/nagios/etc/nagios.cfg","/mnt/nagios –check","systemctl status nagios","https://profesores.es nagios"],ans:0},
{q:"Según el CCN, ¿cuál es la versión mínima y recomendada de TLS?",opts:["Mínima 1.1, recomendada 1.1","Mínima 1.0, recomendada 1.1","Mínima 1.2, recomendada 1.3","Mínima 1.1, recomendada 1.3"],ans:2},

// === 25 preguntas adicionales sobre los temas del Supuesto II ===
{q:"La red asignada al Ministerio es 10.9.0.0/16 y se divide en 16 subredes. ¿Cuál es la máscara de cada subred?",opts:["255.255.240.0 (/20)","255.255.248.0 (/21)","255.255.224.0 (/19)","255.255.252.0 (/22)"],ans:0},
{q:"Si la red ministerial es 10.9.0.0/16 dividida en 16 subredes, ¿cuál es el rango de la última subred?",opts:["10.9.240.0 – 10.9.255.255","10.9.224.0 – 10.9.239.255","10.9.248.0 – 10.9.255.255","10.9.252.0 – 10.9.255.255"],ans:0},
{q:"En Linux, ¿qué fichero de configuración principal utiliza BIND para DNS?",opts:["/etc/bind/named.conf","/etc/dns/bind.conf","/etc/named/dns.conf","/var/bind/config.dns"],ans:0},
{q:"Apache Tomcat sirve aplicaciones basadas en:",opts:["PHP y Perl","Java Servlets y JSP","Python WSGI","Ruby on Rails"],ans:1},
{q:"¿Qué puerto utiliza por defecto el protocolo HTTPS?",opts:["80","8080","443","8443"],ans:2},
{q:"Un CPD TIER III garantiza una disponibilidad mínima de:",opts:["99,671%","99,741%","99,982%","99,995%"],ans:2},
{q:"¿Qué protocolo se usa para la asignación dinámica de direcciones IP mencionada en el supuesto?",opts:["ARP","RARP","DHCP","DNS"],ans:2},
{q:"El protocolo LDAP utiliza por defecto el puerto:",opts:["389","636","443","445"],ans:0},
{q:"En el supuesto se menciona acceso por RDP al servidor BIBLIOTECA con el puerto 389. El puerto estándar de RDP es:",opts:["3389","389","5900","22"],ans:0},
{q:"¿Qué herramienta de las mencionadas se usa para escaneo de puertos y descubrimiento de red?",opts:["Tenable Nessus","Nagios","Nmap","Postfix"],ans:2},
{q:"Nagios es principalmente una herramienta de:",opts:["Gestión de configuración","Monitorización de sistemas y servicios","Análisis de vulnerabilidades","Gestión de incidentes"],ans:1},
{q:"Tenable Nessus se utiliza principalmente para:",opts:["Monitorización de red","Detección de vulnerabilidades","Gestión de parches","Balanceo de carga"],ans:1},
{q:"En un escritorio virtual, ¿qué protocolo es comúnmente utilizado para la conexión remota?",opts:["FTP","RDP o similar (VNC, PCoIP)","SMTP","SNMP"],ans:1},
{q:"El estándar IEEE 802.1Q se relaciona con:",opts:["Spanning Tree Protocol","VLANs (etiquetado de tramas)","WiFi empresarial","PoE (Power over Ethernet)"],ans:1},
{q:"Postfix es un servidor de:",opts:["DNS","Web","Correo electrónico (MTA)","Bases de datos"],ans:2},
{q:"Si el CPD NO está configurado como activo-activo, ¿qué modelo de respaldo tiene?",opts:["Activo-pasivo (manual failover)","Sin respaldo","Cluster balanceado","Réplica síncrona automática"],ans:0},
{q:"¿Qué comando de Linux permite listar las interfaces de red y sus direcciones IP?",opts:["ip addr show","netstat -r","route -n","arp -a"],ans:0},
{q:"En MySQL, ¿qué comando muestra las bases de datos existentes?",opts:["SHOW DATABASES;","LIST DATABASES;","SELECT databases;","VIEW ALL DATABASES;"],ans:0},
{q:"¿Qué comando de Linux reinicia el servicio Postfix?",opts:["systemctl restart postfix","postfix --reload","service mail restart","restart postfix.service"],ans:0},
{q:"CLAUDIA es la herramienta del CCN para:",opts:["Auditoría de código fuente","Detección de APTs y malware avanzado en endpoints","Gestión de certificados digitales","Monitorización de tráfico de red"],ans:1},
{q:"Un certificado SSL/TLS de servidor sirve para:",opts:["Autenticar al cliente ante el servidor","Cifrar la comunicación y autenticar la identidad del servidor","Firmar digitalmente documentos PDF","Gestionar usuarios en LDAP"],ans:1},
{q:"En el contexto del supuesto, ¿qué componente de red se utiliza para configurar VLANs?",opts:["Router Cisco","Switch Cisco con Cisco IOS","Firewall Cisco ASA","Access Point Cisco"],ans:1},
{q:"La redundancia de suministro eléctrico en un CPD se consigue habitualmente con:",opts:["Solo generadores diésel","SAI/UPS y generadores de respaldo","Baterías de móvil industriales","Energía solar exclusivamente"],ans:1},
{q:"¿Qué fichero de configuración principal usa Postfix?",opts:["/etc/postfix/main.cf","/etc/mail/postfix.conf","/etc/smtp/config.cf","/var/postfix/settings.conf"],ans:0},
{q:"¿Qué tipo de registro DNS se utiliza para asociar un nombre de dominio (profesores.es) a una dirección IP?",opts:["MX","CNAME","A","PTR"],ans:2},
];

let answers = new Array(questions.length).fill(null);
let correct=0, wrong=0;

function init(){
  const saved = null; // No localStorage per environment constraints
  const container = document.getElementById('questions-container');
  const dotsWrap = document.getElementById('nav-dots');
  container.innerHTML = '';
  dotsWrap.innerHTML = '';

  questions.forEach((q,i) => {
    // Nav dot
    const dot = document.createElement('div');
    dot.className = 'nav-dot';
    dot.textContent = i+1;
    dot.id = 'dot-'+i;
    dot.onclick = () => document.getElementById('q-'+i).scrollIntoView({behavior:'smooth',block:'center'});
    dotsWrap.appendChild(dot);

    // Question card
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-'+i;
    const letters = ['a','b','c','d'];
    card.innerHTML = `
      <div class="q-header"><span class="q-num">${i+1}/50</span><span class="q-text">${q.q}</span></div>
      <div class="options">${q.opts.map((o,j)=>`
        <button class="opt-btn" data-q="${i}" data-o="${j}" onclick="selectAnswer(${i},${j},this)">
          <span class="letter">${letters[j]})</span><span>${o}</span>
        </button>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });

  updateScoreboard();
}

function selectAnswer(qi, oi, btn){
  if(answers[qi] !== null) return;
  answers[qi] = oi;
  const q = questions[qi];
  const card = document.getElementById('q-'+qi);
  const btns = card.querySelectorAll('.opt-btn');
  const fb = document.getElementById('fb-'+qi);
  const dot = document.getElementById('dot-'+qi);

  btns.forEach(b => b.classList.add('disabled'));

  if(oi === q.ans){
    btn.classList.add('selected-correct');
    card.classList.add('answered-correct');
    fb.textContent = '✓ ¡Correcto!';
    fb.className = 'feedback show fb-correct';
    dot.classList.add('dot-correct');
    correct++;
  } else {
    btn.classList.add('selected-wrong');
    btns[q.ans].classList.add('reveal-correct');
    card.classList.add('answered-wrong');
    const letters = ['a','b','c','d'];
    fb.textContent = '✗ Incorrecto. La respuesta correcta es ' + letters[q.ans] + ')';
    fb.className = 'feedback show fb-wrong';
    dot.classList.add('dot-wrong');
    wrong++;
  }

  updateScoreboard();
  checkFinished();
}

function updateScoreboard(){
  const answered = correct + wrong;
  const skip = questions.length - answered;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-skip').textContent = skip;
  const pct = answered > 0 ? Math.round((correct/answered)*100) : 0;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('progress').style.width = (answered/questions.length*100) + '%';
}

function checkFinished(){
  const answered = correct + wrong;
  if(answered === questions.length){
    const panel = document.getElementById('final-results');
    const pctEl = document.getElementById('final-pct');
    const detail = document.getElementById('final-detail');
    const pct = Math.round((correct/questions.length)*100);
    pctEl.textContent = pct + '%';
    pctEl.className = 'final-pct ' + (pct>=70?'grade-good':pct>=50?'grade-mid':'grade-bad');
    detail.innerHTML = `${correct} correctas · ${wrong} incorrectas · 0 sin contestar<br>
      Puntuación neta (penalizando 1/3): <strong>${(correct - wrong/3).toFixed(2)}</strong> de 50`;
    panel.classList.add('show');
    panel.scrollIntoView({behavior:'smooth'});
  }
}

function resetTest(){
  answers = new Array(questions.length).fill(null);
  correct = 0; wrong = 0;
  document.getElementById('final-results').classList.remove('show');
  init();
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
</body>
</html>
