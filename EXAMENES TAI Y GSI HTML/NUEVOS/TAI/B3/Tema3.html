<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Oficial B3T3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn { transition: all 0.2s ease; border: 2px solid #e2e8f0; }
        .option-btn:hover:not(.disabled) { border-color: #6366f1; background-color: #f5f3ff; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { cursor: default; }
        code { background: #f1f5f9; padding: 2px 4px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <!-- Encabezado -->
        <div class="bg-white rounded-t-2xl shadow-sm border-b p-8 text-center border-t-8 border-indigo-600">
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">TEST BLOQUE III - TEMA 03</h1>
            <p class="text-indigo-600 font-bold mt-1">Programación: Algoritmos, Estructuras y Lenguaje Java</p>
            <div class="mt-6 flex justify-center gap-6">
                <div class="text-center">
                    <span id="counter" class="block text-sm font-black text-slate-400 uppercase">Pregunta</span>
                    <span class="text-xl font-bold text-slate-700">0 / 30</span>
                </div>
                <div class="text-center border-l border-r px-6">
                    <span class="block text-sm font-black text-slate-400 uppercase">Aciertos</span>
                    <span id="score-val" class="text-xl font-bold text-emerald-600">0</span>
                </div>
                <div class="text-center">
                    <span class="block text-sm font-black text-slate-400 uppercase">Progreso</span>
                    <span id="progress-percent" class="text-xl font-bold text-blue-600">0%</span>
                </div>
            </div>
        </div>

        <!-- Contenedor del Test -->
        <div class="bg-white p-8 shadow-xl min-h-[450px] flex flex-col justify-between">
            <div id="quiz-content">
                <div id="question-container">
                    <h2 id="question-text" class="text-lg font-bold leading-snug mb-8 text-slate-800 whitespace-pre-wrap"></h2>
                </div>
                <div id="options" class="grid grid-cols-1 gap-3">
                    <!-- Opciones dinámicas -->
                </div>
            </div>

            <!-- Navegación -->
            <div class="flex justify-between items-center mt-12 pt-6 border-t border-slate-100">
                <button id="prev-btn" class="flex items-center gap-2 px-4 py-2 font-bold text-slate-400 hover:text-slate-800 transition-colors disabled:opacity-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    ANTERIOR
                </button>
                <button id="next-btn" class="bg-slate-800 hover:bg-indigo-600 text-white px-10 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">
                    SIGUIENTE
                </button>
            </div>
        </div>

        <div class="w-full bg-slate-200 h-2 rounded-b-2xl overflow-hidden">
            <div id="progress-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Pantalla Final -->
        <div id="results-screen" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl p-10 max-w-md w-full text-center shadow-2xl">
                <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h2 class="text-3xl font-black text-slate-800 mb-2">¡Repaso Terminado!</h2>
                <p class="text-slate-500 mb-8">Bloque III - Tema 03 completado con éxito.</p>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <span class="block text-xs font-bold text-slate-400 uppercase">Aciertos</span>
                        <span id="final-score" class="text-3xl font-black text-emerald-600">0</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <span class="block text-xs font-bold text-slate-400 uppercase">Total</span>
                        <span class="text-3xl font-black text-slate-800">30</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg">REINTENTAR</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "1. Dada la expresión: ((a>b) && !(c>a)) || (!(d>a) && (c<d))\n¿Qué combinación de valores NO devuelve true?", a: ["a=2, b=6, c=6, d=2", "a=6, b=4, c=4, d=12", "a=7, b=5, c=5, d=1", "a=6, b=4, c=2, d=5"], c: 2 },
            { q: "2. En caso de que no se cumpla la condición en ambos fragmentos de código: ¿En cuál se visualizará el mensaje \"Hola\" al menos una vez?\n\nFRAGMENTO 1:\nwhile (condicion) printf(\"Hola\");\n\nFRAGMENTO 2:\ndo printf(\"Hola\"); while (condicion);", a: ["Solo en el fragmento 2", "En ambos fragmentos", "Solo en el fragmento 1", "En ninguno, pues es necesario que se cumpla la condición"], c: 0 },
            { q: "3. ¿Qué es una variable centinela?", a: ["Es un puntero", "Es un tipo de dato primitivo", "Es una variable booleana", "Ninguna es correcta"], c: 2 },
            { q: "4. Para representar un tipo long en Java se necesitan:", a: ["32 bits", "8 bits", "64 bits", "16 bits"], c: 2 },
            { q: "5. ¿Cuál es la definición de un procedimiento en un lenguaje de programación?", a: ["Subalgoritmo que ejecuta una tarea determinada y devuelve siempre un valor", "Subalgoritmo que ejecuta una tarea determinada y no devuelve ningún valor", "Una variable compleja", "Un bucle infinito"], c: 1 },
            { q: "6. Un lenguaje de programación es de tipado fuerte cuando:", a: ["No permite cambios de tipo de datos en las variables una vez declaradas", "Permite sumar strings y enteros directamente", "Las variables no necesitan declaración previa", "Solo admite números enteros"], c: 0 },
            { q: "7. ¿Qué es el bytecode en Java?", a: ["El código fuente escrito por el programador", "El código binario ejecutable directamente por el hardware", "Un código intermedio independiente de la plataforma que ejecuta la JVM", "Un error de compilación"], c: 2 },
            { q: "8. ¿Cuál es la función del recolector de basura (Garbage Collector) en Java?", a: ["Eliminar archivos temporales del disco duro", "Liberar automáticamente la memoria ocupada por objetos que ya no tienen referencias", "Formatear la memoria RAM", "Cerrar la aplicación cuando hay errores"], c: 1 },
            { q: "9. El polimorfismo en Programación Orientada a Objetos permite:", a: ["Que una clase tenga múltiples nombres", "Que un mismo mensaje sea interpretado de formas distintas por diferentes objetos", "Que un objeto cambie su tipo de dato en tiempo de ejecución", "Ocultar los datos de una clase"], c: 1 },
            { q: "10. ¿Qué palabra clave se usa en Java para que una clase herede de otra?", a: ["implements", "inherits", "extends", "native"], c: 2 },
            { q: "11. Un método declarado como 'static' en Java:", a: ["No puede ser llamado sin instanciar la clase", "Pertenece a la clase en lugar de a una instancia específica", "Es un método que no puede ser modificado", "Solo puede ser privado"], c: 1 },
            { q: "12. ¿Qué es una interfaz en Java?", a: ["Una clase que solo tiene métodos privados", "Un contrato que define métodos que una clase debe implementar", "La parte visual de la aplicación (GUI)", "Un tipo de variable primitiva"], c: 1 },
            { q: "13. El encapsulamiento se logra principalmente mediante:", a: ["El uso de la herencia", "Modificadores de acceso como private y métodos getter/setter", "El uso de bucles for", "La creación de múltiples hilos"], c: 1 },
            { q: "14. ¿Cuál es la salida del siguiente código?\nint x = 5;\nSystem.out.println(x++);", a: ["6", "5", "Error de sintaxis", "0"], c: 1 },
            { q: "15. ¿Qué excepción se lanza en Java al intentar acceder a un objeto que es 'null'?", a: ["ArrayIndexOutOfBoundsException", "NullPointerException", "IOException", "ObjectNotFoundException"], c: 1 },
            { q: "16. En la estructura de control 'switch', ¿qué sucede si se omite el 'break' en un caso?", a: ["Se genera un error de compilación", "La ejecución continúa en el siguiente caso (fall-through)", "Se sale automáticamente del switch", "Se reinicia el programa"], c: 1 },
            { q: "17. ¿Qué es una clase abstracta?", a: ["Una clase que no puede ser instanciada y puede contener métodos sin implementar", "Una clase que solo tiene atributos", "Una clase que se encuentra en un paquete oculto", "Una clase que no tiene nombre"], c: 0 },
            { q: "18. El operador 'instanceof' sirve para:", a: ["Crear una nueva instancia", "Comprobar si un objeto pertenece a una clase determinada", "Borrar una instancia de memoria", "Comparar dos números enteros"], c: 1 },
            { q: "19. ¿Cuál de estos NO es un tipo primitivo en Java?", a: ["int", "boolean", "String", "double"], c: 2 },
            { q: "20. ¿Qué significa que Java sea 'multi-hilo' (multi-threaded)?", a: ["Que puede ejecutarse en varios ordenadores a la vez", "Que puede ejecutar varias partes de un programa de forma concurrente", "Que solo funciona en procesadores con muchos núcleos", "Que puede abrir muchos archivos al mismo tiempo"], c: 1 },
            { q: "21. El constructor de una clase:", a: ["Siempre debe devolver un valor int", "Se llama automáticamente al crear una instancia de la clase", "Debe tener un nombre diferente al de la clase", "Es opcional y no se recomienda usarlo"], c: 1 },
            { q: "22. ¿Para qué sirve el bloque 'finally' en una estructura try-catch?", a: ["Para capturar todas las excepciones", "Para ejecutar código siempre, ocurra o no una excepción", "Para finalizar el programa inmediatamente", "Solo se ejecuta si hay un error"], c: 1 },
            { q: "23. En Java, ¿qué visibilidad tiene un miembro declarado como 'protected'?", a: ["Solo accesible dentro de la misma clase", "Accesible en la misma clase, el mismo paquete y por subclases", "Accesible desde cualquier clase del proyecto", "Solo accesible para métodos estáticos"], c: 1 },
            { q: "24. El método 'equals()' en la clase Object sirve para:", a: ["Comparar si dos referencias apuntan al mismo objeto en memoria", "Comparar el contenido lógico de dos objetos (si se sobreescribe)", "Asignar un valor a una variable", "Verificar si un objeto es nulo"], c: 1 },
            { q: "25. Un array en Java es:", a: ["Una estructura de datos de tamaño dinámico", "Un objeto que almacena un número fijo de elementos del mismo tipo", "Una lista de strings únicamente", "Un método de ordenación"], c: 1 },
            { q: "26. ¿Qué palabra clave se usa para impedir que una clase sea heredada o un método sea sobreescrito?", a: ["static", "const", "final", "abstract"], c: 2 },
            { q: "27. Dada la siguiente declaración de array en Java: int[] numeros = {10, 20, 30, 40, 50};\n¿Qué valor devuelve 'numeros[2]'?", a: ["10", "20", "30", "40"], c: 2 },
            { q: "28. Dada la siguiente matriz en Java:\nint[][] matriz = new int[3][5];\nSuponiendo que matriz[2][4] = 111;\n¿Qué ocurriría al ejecutar:\nSystem.out.print(matriz[2][4]);\nSystem.out.print(matriz[3][4]);", a: ["Primero el valor 111 y luego una excepción", "Solo el valor 111", "Una excepción directamente", "Muestra 111 y 0"], c: 0 },
            { q: "29. El nombre de un parámetro de un constructor o método tal y como se define en su cabecera se conoce como:", a: ["Parámetro por referencia", "Parámetro formal", "Parámetro actual", "Parámetro por valor"], c: 1 },
            { q: "30. Supongamos: float[] SaldoMensual = new float[12];\n¿Cuál es la instrucción correcta para recorrerlo?", a: ["for(int i=1;i<12;i++)", "for(int i=1;i=12;i++)", "for(int i=0;i<12;i++)", "for(int i=1;i<=12;i++)"], c: 2 }
        ];

        let currentIdx = 0;
        let score = 0;
        let userAnswers = new Array(questions.length).fill(null);

        function render() {
            const item = questions[currentIdx];
            
            // UI Update
            document.getElementById('counter').parentElement.querySelector('span:last-child').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('score-val').innerText = score;
            document.getElementById('question-text').innerText = item.q;
            
            const perc = Math.round(((currentIdx + 1) / questions.length) * 100);
            document.getElementById('progress-percent').innerText = `${perc}%`;
            document.getElementById('progress-bar').style.width = `${perc}%`;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            item.a.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-5 rounded-2xl font-bold text-slate-700 bg-white shadow-sm flex items-start gap-4';
                
                const label = document.createElement('span');
                label.className = 'bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-xs font-black mt-1 shrink-0';
                label.innerText = String.fromCharCode(65 + i);
                
                const content = document.createElement('span');
                content.innerText = txt;
                
                btn.appendChild(label);
                btn.appendChild(content);

                if (userAnswers[currentIdx] !== null) {
                    btn.classList.add('disabled');
                    if (i === item.c) btn.classList.add('correct');
                    else if (i === userAnswers[currentIdx]) btn.classList.add('incorrect');
                } else {
                    btn.onclick = () => {
                        userAnswers[currentIdx] = i;
                        if (i === item.c) score++;
                        render();
                    };
                }
                optionsDiv.appendChild(btn);
            });

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            prevBtn.disabled = currentIdx === 0;
            if (currentIdx === questions.length - 1) {
                nextBtn.innerText = "VER RESULTADO";
                nextBtn.classList.replace('bg-slate-800', 'bg-blue-600');
            } else {
                nextBtn.innerText = "SIGUIENTE";
                nextBtn.classList.replace('bg-blue-600', 'bg-slate-800');
            }
        }

        document.getElementById('next-btn').onclick = () => {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                render();
            } else {
                document.getElementById('final-score').innerText = score;
                document.getElementById('results-screen').classList.remove('hidden');
            }
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentIdx > 0) {
                currentIdx--;
                render();
            }
        };

        render();
    </script>
</body>
</html>
