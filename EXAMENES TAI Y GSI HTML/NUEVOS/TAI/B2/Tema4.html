<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bloque II Tema 02 - Periféricos y Almacenamiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .is-correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .is-user-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        <!-- Cabecera -->
        <div class="bg-indigo-800 p-8 text-white text-center relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-yellow-400"></div>
            <h1 class="text-2xl font-black tracking-tight uppercase">Arquitectura de Sistemas</h1>
            <p class="text-indigo-300 mt-2 font-semibold uppercase text-sm tracking-widest">Bloque II - Tema 02 (Preguntas de PDF)</p>
        </div>

        <!-- Barra de Progreso -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-indigo-500 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-8 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <span id="question-number">Pregunta 1</span>
                    <span id="score-live" class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full border border-slate-200">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug"></div>

                <div id="options-container" class="space-y-4"></div>

                <div class="flex justify-between mt-10 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="flex items-center px-5 py-2 rounded-xl font-bold text-slate-500 hover:bg-slate-100 disabled:opacity-30 transition-all">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        Anterior
                    </button>
                    <button id="next-btn" class="flex items-center px-8 py-3 bg-indigo-700 text-white rounded-xl font-bold hover:bg-indigo-800 disabled:opacity-50 transition-all shadow-lg shadow-indigo-200">
                        Siguiente
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div id="results-ui" class="hidden text-center py-10">
                <div class="inline-block p-4 bg-indigo-50 rounded-full mb-6 border border-indigo-100">
                    <svg class="w-16 h-16 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-slate-900 mb-2">Test Finalizado</h2>
                <div class="grid grid-cols-3 gap-4 my-8">
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-correct" class="text-4xl font-black text-green-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Aciertos</div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-incorrect" class="text-4xl font-black text-red-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Errores</div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-empty" class="text-4xl font-black text-amber-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Omitidas</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="px-10 py-4 font-bold text-white bg-indigo-700 rounded-xl hover:bg-indigo-800 transition-colors shadow-lg">Reiniciar Test</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. Si tomamos a los registros del procesador como punta de una jerarquía de tipos de memoria, y como base, a los medios extraíbles, seleccione el orden adecuado para los tipos de memoria propuestos.", a: ["Memoria caché - Memoria RAM - Disco duro", "Disco duro - Memoria RAM - Memoria caché", "Memoria RAM - Memoria caché - Disco Duro", "Memoria RAM - Memoria ROM - Disco Duro"], c: 0 },
            { q: "2. Indique la mejor definición para la latencia CAS (Column Access Strobe) de los módulos DRAM (Dynamic Random Access Memory)", a: ["Es el tiempo necesario para escribir/leer en un banco de memoria.", "Es el tiempo que emplea la CPU para devolver un valor solicitado ubicado en memoria.", "Es el tiempo, en número de ciclos de reloj, que transcurre entre la solicitud de acceso y la devolución del dato.", "Ninguna es correcta"], c: 2 },
            { q: "3. Ordene de mayor a menor velocidad las siguientes conexiones de dispositivos externos.", a: ["Thunderbolt 2 - USB 3.0", "Firewire s3200 - USB 3.0 - Thunderbolt 3", "USB 3.1 - Firewire 800 - Firewire 400", "Thunderbolt 2 - USB 3.1 - Firewire 800"], c: 3 },
            { q: "4. ¿Cuál de los siguientes tipos de dispositivo informático de impresión no existe?", a: ["De sublimación", "De arrastre", "De tinta sólida", "Térmica"], c: 1 },
            { q: "5. De los siguientes tipos de conexión para un periférico de salida indique cual es el único que no es capaz de transmitir audio.", a: ["DisplayPort", "HDMI", "DVI", "Todos transmiten audio"], c: 2 },
            { q: "6. Respecto a la tecnología RAID, indique la afirmación correcta.", a: ["RAID 5 requiere un mínimo de 3 discos", "RAID 0 ofrece redundancia de datos", "RAID 1 es también conocido como stripping", "RAID 10 es un RAID de nivel 5 y 0"], c: 0 },
            { q: "7. ¿Qué es el dot pitch de un monitor?", a: ["La distancia entre los centros de los píxeles del mismo color", "El número de píxeles por pulgada", "La velocidad de refresco de la pantalla", "La relación entre el ancho y el alto"], c: 0 },
            { q: "8. ¿Qué tecnología de pantalla utiliza fósforo para emitir luz?", a: ["LCD", "LED", "OLED", "Plasma"], c: 3 },
            { q: "9. ¿Cuál es el número máximo de dispositivos que se pueden conectar a un bus SCSI?", a: ["8", "15", "Depende de la versión del bus (7 o 15 sin contar el adaptador)", "127"], c: 2 },
            { q: "10. La tecnología Bluetooth 5.0 ofrece, respecto a la versión anterior:", a: ["Menor alcance", "El cuádruple de alcance y el doble de velocidad", "Solo mejoras en la seguridad", "Velocidades de hasta 100 Mbps"], c: 1 },
            { q: "11. El puerto eSATA se caracteriza por:", a: ["Permitir la conexión de discos duros externos a la misma velocidad que internos", "Ser compatible físicamente con USB", "No permitir el cambio en caliente (hot-plug)", "Alimentar siempre eléctricamente al dispositivo"], c: 0 },
            { q: "12. ¿Qué significa que un monitor sea de 144Hz?", a: ["Que tiene 144 píxeles de ancho", "Que actualiza la imagen 144 veces por segundo", "Que consume 144 vatios", "Que tiene una resolución 4K"], c: 1 },
            { q: "13. ¿Cuál de los siguientes estándares de bus permite 'Hot Swapping' (conexión en caliente)?", a: ["ISA", "PCI", "USB", "IDE"], c: 2 },
            { q: "14. Los discos duros SAS (Serial Attached SCSI):", a: ["Sustituyen a la conexión paralela de SCSI", "No son compatibles con backplanes SATA", "Son más lentos que los discos SATA", "Solo se usan en entornos domésticos"], c: 0 },
            { q: "15. En una configuración RAID 1 (Espejo):", a: ["La capacidad total es la suma de todos los discos", "Si falla un disco se pierden todos los datos", "La información se duplica en dos o más discos", "Se requiere un mínimo de 3 discos"], c: 2 },
            { q: "16. La especificación NVMe (Non-Volatile Memory Express):", a: ["Es un protocolo diseñado para discos mecánicos", "Se utiliza exclusivamente en memorias USB", "Optimiza el acceso a discos SSD a través del bus PCIe", "Es más lenta que el protocolo AHCI"], c: 2 },
            { q: "17. ¿Qué tipo de conector USB es reversible?", a: ["USB Tipo A", "USB Tipo B", "Mini-USB", "USB Tipo C"], c: 3 },
            { q: "18. Un bit de paridad en un sistema de memoria sirve para:", a: ["Corregir errores de varios bits", "Detectar errores de un solo bit", "Duplicar la velocidad de la memoria", "Aumentar la capacidad de almacenamiento"], c: 1 },
            { q: "19. ¿Cuál de las siguientes es una característica de las pantallas OLED?", a: ["Necesitan una fuente de retroiluminación trasera", "Cada píxel emite su propia luz", "Consumen más energía que el LCD para mostrar negros", "Tienen ángulos de visión muy reducidos"], c: 1 },
            { q: "20. El bus PCI Express (PCIe) es un bus de tipo:", a: ["Paralelo", "Serie", "Síncrono de 32 bits", "Asíncrono de 64 bits"], c: 1 },
            { q: "21. El estándar VESA se asocia comúnmente con:", a: ["Soportes y montaje de monitores", "Protocolos de red", "Seguridad de archivos", "Sistemas de alimentación ininterrumpida"], c: 0 },
            { q: "22. En la jerarquía de memoria, la memoria con menor tiempo de acceso es:", a: ["RAM", "Caché L3", "Registros", "Disco SSD"], c: 2 },
            { q: "23. ¿Qué nivel de RAID realiza paridad distribuida?", a: ["RAID 5", "RAID 1", "RAID 0", "RAID 2"], c: 0 },
            { q: "24. El estándar DisplayPort es impulsado principalmente por:", a: ["Intel", "VESA", "Consorcio HDMI", "Apple"], c: 1 },
            { q: "25. ¿Cuál es la principal ventaja de las memorias DDR respecto a las SDR?", a: ["Usan menos pines", "Transfieren datos dos veces por cada ciclo de reloj", "Son más baratas de fabricar", "Tienen mayor latencia"], c: 1 },
            { q: "26. Indique la afirmación correcta respecto a los SSD (Solid State Drive):", a: ["Tienen mejor rendimiento (mayor ancho de banda y menor latencia) que los tradicionales HDD", "Están basados en memorias no volátiles", "Son más caros que los HDD", "Todas son correctas"], c: 3 },
            { q: "27. El bus AGP está orientado principalmente a:", a: ["La conexión en serie de diferentes dispositivos", "La comunicación a alta velocidad entre el ordenador y los routers ADSL", "La conexión de tarjetas gráficas, ofreciendo más velocidad y canales que el PCI", "La comunicación sin hilos"], c: 2 },
            { q: "28. La especificación USB 3.2:", a: ["Deja de usar los cables USB Tipo C", "No existe, la última es la 3.1", "Aumenta la velocidad de transferencia de datos sobre la versión anterior", "Ofrece velocidades de hasta 40 gbps"], c: 2 },
            { q: "29. Según la nueva especificación de la interface USB, denominada USB-PD, (Power Delivery), la potencia máxima que es capaz de alcanzar es:", a: ["18W", "36W", "60W", "100W"], c: 3 },
            { q: "30. Cuál de las siguientes NO es una interfaz válida para conectar un disco SSD:", a: ["SAS", "SATA", "DVI", "PCIe"], c: 2 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers_B2T2_Full')) || {};

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-number').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-5 rounded-2xl border-2 border-slate-100 option-transition hover:border-indigo-300 hover:bg-indigo-50 font-semibold text-slate-700 shadow-sm';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) {
                        btn.classList.add('is-correct-answer');
                    } else if (i === answers[currentIdx]) {
                        btn.classList.add('is-user-incorrect');
                    }
                } else {
                    btn.onclick = () => selectOption(i);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerHTML = currentIdx === quizData.length - 1 ? "Finalizar" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers_B2T2_Full', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            document.getElementById('score-live').innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) showResults();
            else if (currentIdx < 0) currentIdx = 0;
            else loadQuestion();
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers_B2T2_Full');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        document.getElementById('prev-btn').onclick = () => changeQuestion(-1);
        document.getElementById('next-btn').onclick = () => changeQuestion(1);

        loadQuestion();
    </script>
</body>
</html>
