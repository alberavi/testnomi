<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Completo Arquitectura - Bloque II Tema 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .is-correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .is-user-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        <!-- Cabecera -->
        <div class="bg-slate-800 p-8 text-white text-center relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-400"></div>
            <h1 class="text-2xl font-black tracking-tight uppercase">Arquitectura de Sistemas</h1>
            <p class="text-slate-400 mt-2 font-semibold uppercase text-sm tracking-widest">Bloque II - Tema 01 (30 Preguntas PDF)</p>
        </div>

        <!-- Barra de Progreso -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-blue-500 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-8 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <span id="question-number">Pregunta 1</span>
                    <span id="score-live" class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full border border-slate-200">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug"></div>

                <div id="options-container" class="space-y-4"></div>

                <div class="flex justify-between mt-10 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="flex items-center px-5 py-2 rounded-xl font-bold text-slate-500 hover:bg-slate-100 disabled:opacity-30 transition-all">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        Anterior
                    </button>
                    <button id="next-btn" class="flex items-center px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 disabled:opacity-50 transition-all shadow-lg shadow-slate-200">
                        Siguiente
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div id="results-ui" class="hidden text-center py-10">
                <div class="inline-block p-4 bg-slate-50 rounded-full mb-6 border border-slate-200">
                    <svg class="w-16 h-16 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-slate-900 mb-2">Test Finalizado</h2>
                <div class="grid grid-cols-3 gap-4 my-8">
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-correct" class="text-4xl font-black text-green-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Aciertos</div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-incorrect" class="text-4xl font-black text-red-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Errores</div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-empty" class="text-4xl font-black text-amber-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Omitidas</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="px-10 py-4 font-bold text-white bg-slate-800 rounded-xl hover:bg-slate-900 transition-colors">Reiniciar Test</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. ¿Qué es un Nibble?", a: ["4 bits", "2 bits", "16 bits", "8 bits"], c: 0 },
            { q: "2. Existen tres tipos de buses principales:", a: ["De datos, de dirección y de ejecución", "De datos, de dirección y de registro", "De datos, de dirección y de control", "De datos, de dirección y de memoria"], c: 2 },
            { q: "3. El registro Contador de programa:", a: ["Contiene la dirección de la instrucción siguiente que hay que leer de la CPU", "Contiene la dirección de la instrucción siguiente que hay que ejecutar", "Contiene la dirección del siguiente registro que hay que leer de la memoria", "Contiene la dirección de la instrucción siguiente que hay que leer de la memoria"], c: 3 },
            { q: "4. El registro de instrucción:", a: ["Contiene las instrucciones que se han ejecutado", "Contiene la instrucción que hay en la memoria", "Contiene la instrucción que hay que ejecutar", "Contiene la instrucción que hay que registrar"], c: 2 },
            { q: "5. Según los criterios de localización y la explicitación de los operandos, podemos identificar las siguientes arquitecturas del juego de instrucciones:", a: ["Arquitecturas basadas en pilas, en acumulador y en registros de propósito general", "Arquitecturas basadas en pilas, en acumulador y en registros de datos", "Arquitecturas basadas en pilas, en acumulador y en registros", "Arquitecturas basadas en pilas, en acumulador y en registros de información"], c: 0 },
            { q: "6. Los dos registros principales relacionados con el acceso a las instrucciones son:", a: ["Contador del programa y registro de instrucción", "Contador de datos y registro de control", "Contador de instrucción y registro de estado", "Contador del programa y registro de control"], c: 0 },
            { q: "7. ¿Cómo se denomina el mecanismo que permite a la CPU ejecutar más de una instrucción a la vez?", a: ["Paralelismo", "Segmentación o Pipelining", "Multitarea", "Concurrencia"], c: 1 },
            { q: "8. El registro de estado de la CPU:", a: ["Almacena el resultado de la última operación", "Informa de las condiciones en que se ha producido el resultado de la última operación", "Almacena la instrucción actual", "Controla el flujo de datos en el bus"], c: 1 },
            { q: "9. ¿En qué parte de la CPU se realizan las operaciones de suma, resta y comparaciones lógicas?", a: ["Unidad de Control", "Unidad de Memoria", "Unidad Aritmético Lógica (ALU)", "Unidad de Bus"], c: 2 },
            { q: "10. ¿Cuál de los siguientes no es un componente de la Unidad de Control?", a: ["Decodificador", "Reloj", "Contador de Programa", "Unidad de coma flotante (FPU)"], c: 3 },
            { q: "11. El ciclo de instrucción consta de las fases de:", a: ["Búsqueda y Ejecución", "Lectura y Escritura", "Búsqueda, Decodificación y Ejecución", "Almacenamiento y Recuperación"], c: 2 },
            { q: "12. ¿Qué memoria es volátil?", a: ["ROM", "PROM", "EEPROM", "RAM"], c: 3 },
            { q: "13. La memoria caché se utiliza para:", a: ["Almacenar datos permanentemente", "Aumentar la capacidad de la RAM", "Acelerar el acceso a los datos por parte de la CPU", "Guardar la configuración de la BIOS"], c: 2 },
            { q: "14. ¿Qué es el tiempo de acceso a la memoria?", a: ["El tiempo que tarda el bus en activarse", "El tiempo que transcurre desde que se pide un dato hasta que se recibe", "El tiempo que dura una instrucción", "La velocidad del reloj del sistema"], c: 1 },
            { q: "15. ¿Qué significa DMA?", a: ["Direct Memory Access", "Data Memory Access", "Digital Memory Allocation", "Direct Management Access"], c: 0 },
            { q: "16. El bus de direcciones es un bus:", a: ["Bidireccional", "Unidireccional", "Serie", "Asíncrono"], c: 1 },
            { q: "17. ¿Qué tipo de arquitectura de procesador utiliza instrucciones de tamaño fijo y formato simple?", a: ["CISC", "RISC", "EPIC", "VLIW"], c: 1 },
            { q: "18. Un procesador de 64 bits puede direccionar teóricamente una memoria de:", a: ["4 GB", "16 GB", "16 EB (Exabytes)", "1 TB"], c: 2 },
            { q: "19. Los registros de propósito general:", a: ["Se usan exclusivamente para el contador de programa", "Solo pueden almacenar direcciones de memoria", "Pueden almacenar tanto datos como direcciones", "Son registros externos a la CPU"], c: 2 },
            { q: "20. El bus de control se encarga de:", a: ["Transportar los datos entre registros", "Seleccionar la dirección de memoria", "Sincronizar las actividades de los distintos periféricos y componentes", "Medir la velocidad del procesador"], c: 2 },
            { q: "21. ¿Qué es la Unidad de Gestión de Memoria (MMU)?", a: ["Un tipo de memoria caché", "Un dispositivo que traduce direcciones lógicas en físicas", "Una parte de la ALU", "El gestor de archivos del sistema"], c: 1 },
            { q: "22. La arquitectura Harvard se diferencia de la Von Neumann en que:", a: ["Harvard usa un único bus para datos e instrucciones", "Harvard tiene memorias y buses separados para datos e instrucciones", "Harvard no usa registros", "Von Neumann es más rápida"], c: 1 },
            { q: "23. ¿Qué registro contiene el código de operación de la instrucción que se está ejecutando?", a: ["Contador de Programa (PC)", "Registro de Instrucción (IR)", "Acumulador", "Puntero de Pila"], c: 1 },
            { q: "24. El 'Tick' o pulso de reloj define:", a: ["La cantidad de memoria RAM", "La velocidad de transferencia del disco duro", "La unidad mínima de tiempo de la CPU", "El tamaño del bus de datos"], c: 2 },
            { q: "25. Los registros internos de la CPU:", a: ["Son más lentos que la memoria RAM", "Se encuentran fuera del chip del procesador", "Son la memoria más rápida del sistema", "Corresponden a instrucciones del sistema operativo"], c: 2 },
            { q: "26. ¿Cómo se denomina el bus que nos indica la memoria máxima que podemos direccionar?", a: ["Bus de direcciones", "Bus de datos", "Bus de control", "Bus de Memoria"], c: 0 },
            { q: "27. En el contexto de la arquitectura de ordenadores, ¿cuál de los siguientes buses NO existe?", a: ["Bus de datos", "Bus de control", "Bus de grabación", "Bus de direcciones"], c: 2 },
            { q: "28. Un megabyte tiene:", a: ["8.000.000 Bits", "1.048.576 Bytes", "8.388.608 Bits", "1.048.577 Bits"], c: 1 },
            { q: "29. Respecto a los distintos tipos de memoria ROM podemos decir:", a: ["EPROM: se borra con rayos infrarrojos", "PROM: el usuario puede programarla cuantas veces quiera", "EPPROM: se usa un dispositivo de ancho espectro", "EEPROM: puede ser borrada y grabada repetidas veces eléctricamente"], c: 3 },
            { q: "30. ¿Cuál de los siguientes es el almacenamiento de mayor memoria?", a: ["23 TB", "256 PB", "25 EB", "124 GB"], c: 2 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers_B2T1_Full')) || {};

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-number').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-5 rounded-2xl border-2 border-slate-100 option-transition hover:border-blue-300 hover:bg-slate-50 font-semibold text-slate-700 shadow-sm';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) {
                        btn.classList.add('is-correct-answer');
                    } else if (i === answers[currentIdx]) {
                        btn.classList.add('is-user-incorrect');
                    }
                } else {
                    btn.onclick = () => selectOption(i);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerHTML = currentIdx === quizData.length - 1 ? "Finalizar" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers_B2T1_Full', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            document.getElementById('score-live').innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) showResults();
            else if (currentIdx < 0) currentIdx = 0;
            else loadQuestion();
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers_B2T1_Full');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        document.getElementById('prev-btn').onclick = () => changeQuestion(-1);
        document.getElementById('next-btn').onclick = () => changeQuestion(1);

        loadQuestion();
    </script>
</body>
</html>
