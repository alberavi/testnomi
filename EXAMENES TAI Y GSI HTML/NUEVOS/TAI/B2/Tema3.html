<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bloque II Tema 03 - Estructuras de Datos y Algoritmos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .is-correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .is-user-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        <!-- Cabecera -->
        <div class="bg-emerald-800 p-8 text-white text-center relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-yellow-400"></div>
            <h1 class="text-2xl font-black tracking-tight uppercase">Arquitectura de Sistemas</h1>
            <p class="text-emerald-300 mt-2 font-semibold uppercase text-sm tracking-widest">Bloque II - Tema 03 (Estructuras y Algoritmos)</p>
        </div>

        <!-- Barra de Progreso -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-emerald-500 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-8 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <span id="question-number">Pregunta 1</span>
                    <span id="score-live" class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full border border-slate-200">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug"></div>

                <div id="options-container" class="space-y-4"></div>

                <div class="flex justify-between mt-10 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="flex items-center px-5 py-2 rounded-xl font-bold text-slate-500 hover:bg-slate-100 disabled:opacity-30 transition-all">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        Anterior
                    </button>
                    <button id="next-btn" class="flex items-center px-8 py-3 bg-emerald-700 text-white rounded-xl font-bold hover:bg-emerald-800 disabled:opacity-50 transition-all shadow-lg shadow-emerald-200">
                        Siguiente
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div id="results-ui" class="hidden text-center py-10">
                <div class="inline-block p-4 bg-emerald-50 rounded-full mb-6 border border-emerald-100">
                    <svg class="w-16 h-16 text-emerald-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-slate-900 mb-2">Test Finalizado</h2>
                <div class="grid grid-cols-3 gap-4 my-8">
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-correct" class="text-4xl font-black text-green-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Aciertos</div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-incorrect" class="text-4xl font-black text-red-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Errores</div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div id="res-empty" class="text-4xl font-black text-amber-600">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400 mt-1">Omitidas</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="px-10 py-4 font-bold text-white bg-emerald-700 rounded-xl hover:bg-emerald-800 transition-colors shadow-lg">Reiniciar Test</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. Un registro lógico es:", a: ["Una memoria formada por elementos que tienen información relativa a un mismo ente", "Una estructura de datos formada por elementos que tienen información relativa a un mismo ente", "Una variable por elementos que tienen información relativa a un mismo ente", "Ninguna de las anteriores es correcta"], c: 1 },
            { q: "2. Un árbol binario se llama completo si todos sus nodos tienen:", a: ["Exactamente un subárbol", "Exactamente dos subárboles", "Cada nodo puede tener 0, 1 o 2 subárboles", "Ninguna de las anteriores es correcta"], c: 1 },
            { q: "3. Una matriz formada por filas y columnas:", a: ["Es un array bidimensional", "Se necesitan especificar dos subíndices", "Para especificar o localizar un valor se especifican dos posiciones", "Todas son correctas"], c: 3 },
            { q: "4. Si hablamos de una lista, señale la respuesta correcta:", a: ["Está formada por un número variable de archivos", "Todos los elementos tienen un sucesor, salvo el último", "Todos los elementos tienen un predecesor", "Las respuestas B y C son correctas"], c: 1 },
            { q: "5. El factor de blocaje es:", a: ["El número de registros físicos contenidos en un registro lógico", "El número de bloques lógicos contenidos en un bloque físico", "El número de registros lógicos contenidos en un registro físico", "El número de bloques físicos contenidos en un bloque lógico"], c: 2 },
            { q: "6. Los registros que componen un fichero con organización secuencial encadenada almacenan, además de su propia información, un:", a: ["Puntero", "Fichero", "Nodo", "Bit de paridad"], c: 0 },
            { q: "7. ¿Cómo se conoce a la estructura de datos que utiliza la estrategia LIFO (Last In, First Out)?", a: ["Cola", "Pila", "Árbol", "Grafo"], c: 1 },
            { q: "8. ¿Cuál de las siguientes afirmaciones sobre las colas es correcta?", a: ["El primer elemento en entrar es el último en salir", "Siguen el algoritmo FIFO (First In, First Out)", "Solo se pueden insertar elementos por el frente", "No permiten el borrado de elementos"], c: 1 },
            { q: "9. En un árbol, el nodo que no tiene sucesores se denomina:", a: ["Raíz", "Padre", "Hoja", "Rama"], c: 2 },
            { q: "10. ¿Qué estructura de datos es la más adecuada para representar una jerarquía?", a: ["Lista", "Pila", "Árbol", "Matriz"], c: 2 },
            { q: "11. Un grafo en el que las aristas tienen un sentido definido se llama:", a: ["Grafo no dirigido", "Grafo completo", "Grafo dirigido", "Grafo conexo"], c: 2 },
            { q: "12. La altura de un árbol se define como:", a: ["El número total de nodos", "El nivel máximo de sus nodos", "El número de nodos hoja", "El número de subárboles del nodo raíz"], c: 1 },
            { q: "13. ¿Qué es un nodo en el contexto de estructuras de datos dinámicas?", a: ["Un error de programación", "Un elemento que contiene un dato y uno o más punteros", "El final de un archivo", "Un tipo de variable entera"], c: 1 },
            { q: "14. En una lista doblemente enlazada:", a: ["Cada nodo apunta solo al siguiente", "Cada nodo apunta solo al anterior", "Cada nodo apunta al siguiente y al anterior", "No existen punteros"], c: 2 },
            { q: "15. El recorrido de un árbol en el que se visita primero la raíz, luego el subárbol izquierdo y finalmente el derecho se llama:", a: ["Inorden", "Postorden", "Preorden", "Niveles"], c: 2 },
            { q: "16. ¿Cuál de los siguientes algoritmos se utiliza para encontrar el camino más corto en un grafo?", a: ["Quicksort", "Prim", "Bubble Sort", "Dijkstra"], c: 3 },
            { q: "17. El algoritmo de Kruskal sirve para:", a: ["Ordenar una lista de números", "Encontrar el árbol de expansión mínima en un grafo", "Recorrer un árbol binario", "Insertar un elemento en una pila"], c: 1 },
            { q: "18. ¿Qué es la complejidad algorítmica?", a: ["Lo difícil que es escribir el código", "La cantidad de líneas de código del programa", "La medida del tiempo y/o espacio que consume un algoritmo al ejecutarse", "El número de variables globales utilizadas"], c: 2 },
            { q: "19. Un algoritmo con complejidad O(1) se dice que es de orden:", a: ["Lineal", "Cuadrático", "Logarítmico", "Constante"], c: 3 },
            { q: "20. El método de ordenación que divide la lista en dos mitades, las ordena por separado y luego las mezcla se llama:", a: ["Burbuja", "Inserción", "Mergesort", "Selección"], c: 2 },
            { q: "21. ¿Cuál es la complejidad promedio del algoritmo Quicksort?", a: ["O(n)", "O(n²)", "O(n log n)", "O(log n)"], c: 2 },
            { q: "22. En la teoría de grafos, un ciclo es:", a: ["Un camino que comienza y termina en el mismo nodo", "Un nodo sin aristas", "Una arista que conecta un nodo consigo mismo", "Un grafo sin hojas"], c: 0 },
            { q: "23. ¿Qué estructura de datos se utiliza típicamente para implementar la recursividad?", a: ["Cola", "Pila", "Grafo", "Árbol"], c: 1 },
            { q: "24. Un grafo es 'conexo' si:", a: ["Todos los nodos tienen el mismo grado", "Existe un camino entre cualquier par de nodos", "No tiene ciclos", "Tiene un número par de nodos"], c: 1 },
            { q: "25. Indique la afirmación FALSA sobre grafos:", a: ["El grado de un nodo es el número de aristas que salen de ese nodo", "Un grafo es conectado si cada nodo del grafo es adyacente a todos los demás", "Un grafo es completo si no tiene bucles ni aristas múltiples", "Un grafo es dirigido si la arista está definida por un par no ordenado"], c: 3 },
            { q: "26. El algoritmo de ordenación cuyo funcionamiento se basa en la elección de un elemento pivote se llama:", a: ["Selección directa", "Bubble Sort", "Pivot Sort", "Quicksort"], c: 3 },
            { q: "27. Algoritmo de ordenación que consiste en el recorrido por la lista seleccionando en cada iteración un valor como clave e insertándolo en el lugar correspondiente:", a: ["Burbuja", "Inversión", "Selección", "Inserción"], c: 3 },
            { q: "28. Indica cuál es la función de complejidad algorítmica de mayor eficiencia:", a: ["Orden logarítmico", "Orden cuadrático", "Orden lineal", "Orden constante"], c: 3 },
            { q: "29. La complejidad del algoritmo Mergesort es de:", a: ["O(n²)", "O(n log n)", "O(log n)", "O(n)"], c: 1 },
            { q: "30. Cuál de los siguientes algoritmos se corresponden con la teoría de grafos:", a: ["Quicksort, Mergesort y Bubblesort", "Kruskal, Prim y Dijkstra", "Kruskal, Prim y Quicksort", "Kruskal, Prim y Kijdstra"], c: 1 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers_B2T3_Full')) || {};

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-number').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-5 rounded-2xl border-2 border-slate-100 option-transition hover:border-emerald-300 hover:bg-emerald-50 font-semibold text-slate-700 shadow-sm';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) {
                        btn.classList.add('is-correct-answer');
                    } else if (i === answers[currentIdx]) {
                        btn.classList.add('is-user-incorrect');
                    }
                } else {
                    btn.onclick = () => selectOption(i);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerHTML = currentIdx === quizData.length - 1 ? "Finalizar" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers_B2T3_Full', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            document.getElementById('score-live').innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) showResults();
            else if (currentIdx < 0) currentIdx = 0;
            else loadQuestion();
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers_B2T3_Full');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        document.getElementById('prev-btn').onclick = () => changeQuestion(-1);
        document.getElementById('next-btn').onclick = () => changeQuestion(1);

        loadQuestion();
    </script>
</body>
</html>
