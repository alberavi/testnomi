<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Interactivo - Bloque IV Tema 09</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="bg-red-700 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase tracking-tight">TEST BLOQUE IV - TEMA 09 SEGURIDAD EN REDES</h1>
            <p class="text-red-100 mt-2 font-medium">Seguridad Perimetral: Firewalls, Proxies y VPNs</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-red-500 h-2 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-6">
            <!-- Quiz UI -->
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-6 text-sm font-bold text-slate-500 uppercase tracking-widest">
                    <span id="question-number">Pregunta 1 de 33</span>
                    <span id="score-live">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-lg font-semibold text-slate-800 mb-6 leading-relaxed"></div>

                <div id="options-container" class="space-y-3"></div>

                <!-- Navigation -->
                <div class="flex justify-between mt-8 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="px-6 py-2 rounded-lg font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-30 transition-colors">
                        Anterior
                    </button>
                    <button id="next-btn" class="px-6 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 disabled:opacity-50 transition-all shadow-md active:transform active:scale-95">
                        Siguiente
                    </button>
                </div>
            </div>

            <!-- Results UI -->
            <div id="results-ui" class="hidden text-center py-8">
                <h2 class="text-3xl font-black text-slate-900 mb-2">RESULTADOS</h2>
                <p class="text-slate-500 mb-8 font-medium">Evaluación de Seguridad Perimetral</p>
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="p-4 bg-green-50 rounded-xl border border-green-100 shadow-sm">
                        <div id="res-correct" class="text-3xl font-black text-green-600">0</div>
                        <div class="text-[10px] text-green-700 uppercase font-black tracking-tighter">Correctas</div>
                    </div>
                    <div class="p-4 bg-red-50 rounded-xl border border-red-100 shadow-sm">
                        <div id="res-incorrect" class="text-3xl font-black text-red-600">0</div>
                        <div class="text-[10px] text-red-700 uppercase font-black tracking-tighter">Incorrectas</div>
                    </div>
                    <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 shadow-sm">
                        <div id="res-empty" class="text-3xl font-black text-amber-600">0</div>
                        <div class="text-[10px] text-amber-700 uppercase font-black tracking-tighter">Omitidas</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black hover:bg-black transition-all shadow-lg uppercase tracking-widest">
                    Reiniciar Evaluación
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. ¿Cuál de las siguientes son características de un buena seguridad perimetral informática?", a: ["Resistencia, Selección, Cuarentena, Filtros.", "Resistencia, Identificación, Cuarentena, Filtros.", "Ninguna es correcta.", "Emergencia, Identificación, Cuarentena, Filtros."], c: 1 },
            { q: "2. A algunos proxy se les conoce como transparentes porque:", a: ["Combina el proxy con NAT de manera que las conexiones son enrutadas dentro del proxy sin configuración por parte del cliente.", "No realizan la función de filtrado de sitios prohibidos.", "Es un proxy solo software, sin ningún componente hardware.", "Permite guardar las páginas web más visitadas y así acelerar las consultas."], c: 0 },
            { q: "3. ¿Cuáles son los firewall encargados de filtrar por IP de origen o de destino?", a: ["Firewall de capa de red.", "Firewall de VPN.", "Firewall de capa de aplicación.", "Firewall personal."], c: 0 },
            { q: "4. Mediante las funcionalidades que aporta un sistema firewall, éste al recibir peticiones puede aplicar tres reglas básicas, que son:", a: ["Get, Head and Post.", "Ninguna respuesta es correcta.", "Send, deny y drop.", "Allow, deny y delete."], c: 1 },
            { q: "5. Entre los riesgos de las redes inalámbricas, el 'eavesdropping' sucede cuando un individuo no autorizado:", a: ["Se coloca en medio de la comunicación suplantando a una de las partes.", "Inyecta peticiones masivas de asociación.", "Captura de forma pasiva el tráfico de datos en el aire.", "Inunda la red con interferencias para degradar el servicio."], c: 2 },
            { q: "6. Un proxy inverso (reverse proxy):", a: ["Protege a los clientes de una red interna.", "Se sitúa delante de los servidores web para recibir las peticiones de los clientes externos.", "Solo funciona con el protocolo FTP.", "No permite realizar balanceo de carga."], c: 1 },
            { q: "7. ¿Qué protocolo es comúnmente utilizado para establecer túneles VPN en la capa 3 del modelo OSI?", a: ["SSL/TLS", "IPsec", "SSH", "L2TP"], c: 1 },
            { q: "8. El modo de operación de IPsec que cifra solo los datos (carga útil) pero no la cabecera IP original se denomina:", a: ["Modo Túnel", "Modo Seguro", "Modo Transporte", "Modo Gateway"], c: 2 },
            { q: "9. ¿Cuál es la función principal de una DMZ (Zona Desmilitarizada)?", a: ["Aislar completamente la red interna de internet.", "Alojar servidores que deben ser accesibles desde internet pero protegidos de la red interna.", "Eliminar la necesidad de usar firewalls.", "Sincronizar las bases de datos de la empresa."], c: 1 },
            { q: "10. Los firewalls de inspección de estado (Stateful Inspection):", a: ["Filtran paquetes basándose solo en la cabecera IP sin mirar el estado de la conexión.", "Mantienen una tabla de estados para rastrear las conexiones activas y tomar decisiones basadas en el contexto.", "Son firewalls que solo funcionan en la capa física.", "Solo pueden filtrar tráfico UDP."], c: 1 },
            { q: "11. En una VPN de acceso remoto (client-to-site):", a: ["Se conectan permanentemente dos sedes de una organización.", "Un usuario individual se conecta a la red corporativa mediante un software cliente.", "No se utiliza cifrado de datos.", "Es obligatorio el uso de cables de fibra óptica."], c: 1 },
            { q: "12. ¿Cuál de los siguientes protocolos de VPN es una evolución de PPTP desarrollada por Microsoft y Cisco?", a: ["L2TP", "IPsec", "SSTP", "IKEv2"], c: 2 },
            { q: "13. Un firewall de tipo 'Application Gateway' (Proxy de Aplicación) opera en la capa:", a: ["Red", "Enlace de datos", "Transporte", "Aplicación"], c: 3 },
            { q: "14. La arquitectura de firewall 'Screened Subnet' utiliza:", a: ["Un solo router para filtrar todo el tráfico.", "Dos routers de filtrado y un bastion host, creando una DMZ.", "Solo software instalado en los PCs de los usuarios.", "Un sistema de detección de intrusos pasivo."], c: 1 },
            { q: "15. ¿Qué significa 'Bastion Host' en el contexto de seguridad perimetral?", a: ["Un servidor altamente asegurado y diseñado para resistir ataques, siendo el punto de contacto con el exterior.", "Un servidor de respaldo oculto en la red interna.", "Una herramienta para realizar copias de seguridad automáticas.", "El router principal de la oficina."], c: 0 },
            { q: "16. El protocolo AH (Authentication Header) en IPsec proporciona:", a: ["Confidencialidad (cifrado).", "Integridad y autenticidad del origen, pero no confidencialidad.", "Solo compresión de datos.", "Asignación dinámica de IPs."], c: 1 },
            { q: "17. El protocolo ESP (Encapsulating Security Payload) en IPsec proporciona:", a: ["Solo autenticación.", "Solo control de acceso.", "Confidencialidad, autenticación e integridad.", "No es un protocolo de IPsec."], c: 2 },
            { q: "18. ¿Qué puerto suele utilizar por defecto una VPN basada en SSL (OpenVPN)?", a: ["443 TCP / 1194 UDP", "80 TCP", "23 TCP", "22 TCP"], c: 0 },
            { q: "19. En seguridad, el término 'HoneyPot' se refiere a:", a: ["Un firewall de última generación.", "Un sistema trampa diseñado para ser atacado y así recolectar información sobre los atacantes.", "Un algoritmo de cifrado de alta velocidad.", "Un gestor de contraseñas corporativo."], c: 1 },
            { q: "20. Una regla de firewall 'Drop' a diferencia de una 'Reject':", a: ["Acepta el paquete pero lo marca como sospechoso.", "Descarta el paquete silenciosamente sin enviar ninguna respuesta al emisor.", "Envía un mensaje ICMP de error al emisor informando del bloqueo.", "Redirige el paquete a otro puerto."], c: 1 },
            { q: "21. El filtrado de contenido en un proxy permite:", a: ["Aumentar la velocidad de la CPU.", "Bloquear el acceso a sitios web específicos basados en categorías o URLs.", "Limpiar el hardware del servidor.", "Cambiar la dirección MAC de los clientes."], c: 1 },
            { q: "22. NAT (Network Address Translation) ayuda a la seguridad porque:", a: ["Cifra todo el tráfico de la red.", "Oculta las direcciones IP privadas internas tras una única IP pública externa.", "Elimina los virus de los correos electrónicos.", "Aumenta el ancho de banda disponible."], c: 1 },
            { q: "23. ¿Qué arquitectura de red permite que una organización extienda su red privada sobre una red pública como Internet?", a: ["LAN", "PAN", "VPN", "MAN"], c: 2 },
            { q: "24. Un IDS (Intrusion Detection System) a diferencia de un IPS (Intrusion Prevention System):", a: ["Bloquea automáticamente la amenaza.", "Solo detecta y alerta sobre la actividad sospechosa pero no actúa para detenerla.", "Es un dispositivo hardware mientras que el IPS es software.", "No necesita conexión a la red."], c: 1 },
            { q: "25. El protocolo IKE (Internet Key Exchange) se utiliza en IPsec para:", a: ["Negociar asociaciones de seguridad (SA) y gestionar claves.", "Enviar los datos cifrados.", "Autenticar las cabeceras de los paquetes.", "Dividir los paquetes en fragmentos pequeños."], c: 0 },
            { q: "26. ¿Qué es un 'Next-Generation Firewall' (NGFW)?", a: ["Un firewall que incluye además inspección profunda de paquetes (DPI) y prevención de intrusiones.", "Un router antiguo con nuevas pegatinas.", "Un firewall que solo funciona con IPv6.", "Un sistema que elimina la necesidad de contraseñas."], c: 0 },
            { q: "27. Las VPN 'Site-to-Site' se utilizan principalmente para:", a: ["Conectar a un comercial con la oficina desde un hotel.", "Interconectar de forma permanente dos oficinas o delegaciones geográficamente distantes.", "Cifrar el tráfico de un solo navegador.", "Dar acceso a invitados al Wi-Fi."], c: 1 },
            { q: "28. Un WAF (Web Application Firewall) está diseñado específicamente para proteger:", a: ["Servidores de archivos compartidos.", "Aplicaciones web contra ataques como inyección SQL o XSS.", "Impresoras en red.", "Sistemas de telefonía IP."], c: 1 },
            { q: "29. ¿Qué ventaja ofrece el uso de certificados digitales en una VPN?", a: ["Reduce el tamaño de los paquetes.", "Proporciona una autenticación de usuarios y dispositivos mucho más robusta que las contraseñas.", "Permite que internet sea gratis.", "Mejora la resolución de la pantalla."], c: 1 },
            { q: "30. Un proxy transparente:", a: ["Requiere configuración manual en el navegador del usuario.", "Es aquel que no modifica las peticiones ni respuestas.", "Intercepta el tráfico sin que el usuario tenga que configurar nada en su dispositivo.", "Permite que las aplicaciones lo usen sin tener que modificarse."], c: 2 },
            { q: "31. Indique cuál de las siguientes afirmaciones relacionadas con IPsec es FALSA:", a: ["IPv6 incluye explícitamente la posibilidad de utilizarlo.", "El protocolo ESP proporciona autenticación.", "El protocolo AH proporciona confidencialidad.", "Puede operar en modo túnel o en modo transporte."], c: 2 },
            { q: "32. ¿Cuál de las siguientes afirmaciones acerca de las Redes Privadas Virtuales (RPVs) es falsa?", a: ["Dos de los protocolos más habituales para establecer RPVs son IPSEC y SSL.", "Habitualmente distinguimos entre dos tipos de RPV: de acceso remoto y site to site.", "Para incrementar la seguridad, el usuario remoto puede acceder utilizando certificados digitales.", "La RPV ofrecen un mejor rendimiento debido a que encapsulan el tráfico en una nueva cabecera IP."], c: 3 },
            { q: "33. Los cortafuegos de filtrado de paquetes ¿en qué capa TCP/IP actúan?", a: ["Capa de sesión", "Capa de transporte", "Capa Internet", "Capa de Aplicación"], c: 2 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers_T9')) || {};

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-number').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl border-2 border-slate-200 option-transition hover:border-red-400 hover:bg-red-50 font-medium text-slate-700';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) btn.classList.add('correct');
                    else if (i === answers[currentIdx]) btn.classList.add('incorrect');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? "Ver Resultados" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers_T9', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            document.getElementById('score-live').innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) showResults();
            else if (currentIdx < 0) currentIdx = 0;
            else loadQuestion();
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });

            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers_T9');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        document.getElementById('prev-btn').onclick = () => changeQuestion(-1);
        document.getElementById('next-btn').onclick = () => changeQuestion(1);

        loadQuestion();
    </script>
</body>
</html>
