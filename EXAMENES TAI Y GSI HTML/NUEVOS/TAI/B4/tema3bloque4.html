
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Interactivo - Bloque IV Tema 03</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-emerald-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase">TEST BLOQUE IV - TEMA 03</h1>
            <p class="text-emerald-100 mt-2">Sistemas de Correo Electrónico y Protocolos de Mensajería</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-emerald-400 h-2 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-6">
            <!-- Quiz UI -->
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-6 text-sm font-medium text-slate-500">
                    <span id="question-number">Pregunta 1 de 30</span>
                    <span id="score-live">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-lg font-semibold text-slate-800 mb-6"></div>

                <div id="options-container" class="space-y-3"></div>

                <!-- Navigation -->
                <div class="flex justify-between mt-8 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="px-6 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 disabled:opacity-30">
                        Anterior
                    </button>
                    <button id="next-btn" class="px-6 py-2 bg-emerald-600 text-white rounded-lg font-medium hover:bg-emerald-700 disabled:opacity-50">
                        Siguiente
                    </button>
                </div>
            </div>

            <!-- Results UI -->
            <div id="results-ui" class="hidden text-center py-8">
                <h2 class="text-3xl font-bold text-slate-800 mb-4">¡Test Finalizado!</h2>
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="p-4 bg-green-50 rounded-lg">
                        <div id="res-correct" class="text-2xl font-bold text-green-600">0</div>
                        <div class="text-xs text-green-700 uppercase font-bold">Correctas</div>
                    </div>
                    <div class="p-4 bg-red-50 rounded-lg">
                        <div id="res-incorrect" class="text-2xl font-bold text-red-600">0</div>
                        <div class="text-xs text-red-700 uppercase font-bold">Incorrectas</div>
                    </div>
                    <div class="p-4 bg-yellow-50 rounded-lg">
                        <div id="res-empty" class="text-2xl font-bold text-yellow-600">0</div>
                        <div class="text-xs text-yellow-700 uppercase font-bold">Sin Responder</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition-colors">
                    Reiniciar Test
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. Cuando el servidor SMTP saliente no registra correctamente la dirección utilizada en 'DE' o 'PARA' muestra el código:", a: ["554", "555", "553", "552"], c: 2 },
            { q: "2. Si pretendemos configurar una cuenta SMTP sobre STARTTLS, utilizaremos el puerto:", a: ["995", "587", "25", "465"], c: 1 },
            { q: "3. El código devuelto por un servidor SMTP para indicar que la transmisión del mensaje ha finalizado es:", a: ["220", "200", "250", "450"], c: 2 },
            { q: "4. ¿Cuál de las siguientes es la secuencia correcta de ejecución de los comandos SMTP según el RFC 2821?", a: ["HELO, MAIL FROM, RCPT TO, DATA", "EHLO, RCPT TO, MAIL FROM, DATA", "HELO, RCPT TO, MAIL FROM, DATA", "EHLO, MAIL FROM, RCPT TO, DATA"], c: 3 },
            { q: "5. ¿Cuál de las siguientes opciones sobre el protocolo ActiveSync es FALSA?", a: ["Permite ejecutar una acción de Remote wipe.", "Está basado en los protocolos HTTP y XML.", "Permite configuración para usar SSL entre cliente y servidor.", "Consigue un mayor rendimiento gracias al empleo de JSON para la reducción del peso."], c: 3 },
            { q: "6. ¿Cuál es el puerto por defecto usado por IMAP sobre TLS?", a: ["993", "995", "990", "991"], c: 0 },
            { q: "7. Sobre el servidor IMAP, indique cuál NO es una característica propia de este protocolo:", a: ["IMAP solo descarga el mensaje si el usuario hace clic en él.", "Utiliza como números de puerto 25, y 587 si la información va cifrada.", "Cuando intercambia información sin cifrar utiliza el puerto 143.", "Cuando intercambia información cifrada utiliza el puerto 993."], c: 1 },
            { q: "8. ¿Cuál código SMTP indica que el servidor está listo para recibir comunicación?", a: ["250", "220", "449", "400"], c: 1 },
            { q: "9. ¿Cuál de las siguientes órdenes del protocolo SMTP se utiliza para indicar el destinatario del mensaje?", a: ["MAIL TO", "SEND TO", "DESTINATION TO", "RCPT TO"], c: 3 },
            { q: "10. Señale la afirmación VERDADERA sobre POP:", a: ["Ninguna es correcta.", "POP solo descargará el mensaje si el usuario hace clic en él.", "POP se pone en contacto con el servicio y descarga todos los mensajes nuevos de él.", "POP permite el acceso desde cualquier dispositivo sin descargar ni almacenar el mensaje."], c: 2 },
            { q: "11. Respecto a las mejoras de POP3 e IMAP en Exchange Server, ¿qué es cierto sobre Exchange 2016 o 2019?", a: ["Es incompatible con la versión TLS de POP3.", "Se bloquea el acceso de cuentas anónimas o de invitado.", "Permiten el uso de cuentas anónimas o de invitado.", "Permite conexión al buzón administrador con POP3 o IMAP4."], c: 1 },
            { q: "12. ¿Cuál de las siguientes afirmaciones sobre códigos de respuesta SMTP es FALSA?", a: ["El código 211 indica que el mensaje va seguido de más información.", "El 501 indica que la dirección del destinatario es errónea.", "El 220 indica que el usuario no puede verificarse ahora, pero se enviará después.", "El 214 muestra información sobre el servidor."], c: 2 },
            { q: "13. Sobre el comando DATA de SMTP, ¿cuál es CORRECTA?", a: ["Responde con un mensaje 354 que indica que ha terminado el envío.", "Responde con un mensaje 350 que indica que ha terminado el envío.", "Responde con un mensaje 350 que indica que puede iniciarse el envío.", "Responde con un mensaje 354 que indica que puede iniciarse el envío."], c: 3 },
            { q: "14. ¿Qué protocolo descarga todos los correos nuevos en el dispositivo del cliente?", a: ["POP", "IMAP", "SNMP", "SMTP"], c: 0 },
            { q: "15. ¿Cuál afirmación sobre POP3 e IMAP4 en Exchange Server 2016 es CORRECTA?", a: ["POP3 se configura automáticamente pero IMAP4 requiere configuración manual.", "Deberán ser configurados en el Active Directory para ambos casos.", "Los servicios de acceso de cliente se configuran automáticamente tanto para POP3 como IMAP4.", "Se configuran automáticamente en cualquier versión de Exchange."], c: 2 },
            { q: "16. Protocolo de sincronización basado en HTTP y XML para dispositivos móviles con Exchange:", a: ["iPOP", "Exchange ActiveSync", "Exchange zMail", "Exchange Axis"], c: 1 },
            { q: "17. ¿Cuál de los siguientes protocolos no cifra el contenido de las comunicaciones?", a: ["Bitmessage", "S/MIME", "OpenPGP", "TLS"], c: 3 },
            { q: "18. Indique la afirmación correcta referente a un segmento Keep-Alive según RFC 1122:", a: ["Si no recibe respuesta, siempre se corta la conexión.", "Se envía aleatoriamente.", "Se envía para comprobar si la conexión con otro dispositivo está activa.", "Ninguna de las anteriores."], c: 2 },
            { q: "19. Implementación mínima de SMTP según RFC 5321 (EHLO, HELO, MAIL, RCPT, DATA...):", a: ["EHLO, HELO, SEND, RCPT, MSG, RSET, ACK, QUIT, VRFY", "EHLO, MAIL, SEND, DATA, RESET, NACK, BYE, VRFY", "EHLO, HELO, MAIL, RCPT, DATA, RSET, NOOP, QUIT, VRFY", "HALO, HELO, MAIL, RCPT, MSG, RESET, NOOP, QUIT, VRFY"], c: 2 },
            { q: "20. Sobre protocolos de correo electrónico, señale la correcta:", a: ["SMTP es un servidor de correo entrante.", "IMAP es un servidor de correo saliente.", "SNMP es un servidor de correo saliente.", "POP es un servidor de correo entrante."], c: 3 },
            { q: "21. El código de respuesta 221 de SMTP indica que:", a: ["El mensaje va seguido de más información.", "Información sobre el servidor.", "El servidor cierra la conexión una vez establecida la comunicación.", "Indica que el servidor está listo."], c: 2 },
            { q: "22. Para garantizar seguridad, un servidor de correo deberá permitir:", a: ["POP3S e IMAPS vía túneles SSL.", "Herramientas de cifrado de clave pública como PGP o GPG.", "POP3 e IMAP ya implementan seguridad de serie.", "Solo SSL/TLS en acceso web."], c: 1 },
            { q: "23. Al abrir la sesión SMTP según RFC 2821, el primer comando es:", a: ["EHLO seguido por <CRLF>.", "HELO seguido por un espacio (escrito <SP>).", "HELO seguido por <CRLF>.", "EHLO seguido por un espacio (escrito <SP>)."], c: 3 },
            { q: "24. Indique la afirmación correcta sobre los protocolos:", a: ["SMTP se emplea para gestionar correo saliente.", "IMAP se emplea para gestionar correo saliente.", "SMTP descarga los mensajes a tu ordenador.", "IMAP descarga los mensajes a tu ordenador."], c: 0 },
            { q: "25. ¿Cuál de los siguientes es un protocolo de servidor saliente de correo?", a: ["SNMP", "POP", "IMAP", "SMTP"], c: 3 },
            { q: "26. Los posibles estados de una base de datos en un DAG de Exchange 2013 son:", a: ["Siempre activas.", "Activa y pasiva.", "Online y standby.", "Activa y reserva."], c: 1 },
            { q: "27. ¿Cuál es correcta sobre Exchange ActiveSync?", a: ["Es un protocolo cliente que permite sincronizar un móvil con el buzón.", "Es la solución PAAS de Microsoft.", "Gestiona el almacenamiento en la nube de Azure.", "Es el servicio de gestión de contraseñas."], c: 0 },
            { q: "28. En el protocolo POP3, el comando para resetear la sesión es:", a: ["DELE", "RESET", "QUIT", "RSET"], c: 3 },
            { q: "29. ¿Cuál afirmación sobre Exchange ActiveSync es CORRECTA?", a: ["Consigue mayor rendimiento por formato de texto ligero.", "Basado en HTTP y JSON.", "Estándar para servicios en red TCP/IP.", "Soporta mensajes en formato HTML."], c: 3 },
            { q: "30. En POP3, el comando para obtener información de número de mensajes y tamaño es:", a: ["RETR", "RGET", "STAT", "PASS"], c: 2 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers_T3')) || {};

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-number').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-lg border-2 border-slate-200 option-transition hover:border-emerald-300 hover:bg-emerald-50 font-medium';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) btn.classList.add('correct');
                    else if (i === answers[currentIdx]) btn.classList.add('incorrect');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? "Ver Resultados" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers_T3', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            document.getElementById('score-live').innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) showResults();
            else if (currentIdx < 0) currentIdx = 0;
            else loadQuestion();
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });

            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers_T3');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        document.getElementById('prev-btn').onclick = () => changeQuestion(-1);
        document.getElementById('next-btn').onclick = () => changeQuestion(1);

        loadQuestion();
    </script>
</body>
</html>
