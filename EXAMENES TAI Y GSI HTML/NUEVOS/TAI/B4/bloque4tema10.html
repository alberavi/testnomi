<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Interactivo - Bloque IV Tema 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-transition { transition: all 0.2s ease; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
        <!-- Encabezado -->
        <div class="bg-emerald-700 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase tracking-tight">TEST BLOQUE IV - TEMA 10 Redes locales.</h1>
            <p class="text-emerald-100 mt-2 font-medium">Redes LAN: Ethernet, Topologías, VLANs y Conmutación</p>
        </div>

        <!-- Barra de Progreso -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-emerald-500 h-2 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-6">
            <!-- Interfaz del Quiz -->
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-6 text-sm font-bold text-slate-500 uppercase tracking-widest">
                    <span id="question-number">Pregunta 1 de 32</span>
                    <span id="score-live">Aciertos: 0</span>
                </div>

                <div id="question-text" class="text-lg font-semibold text-slate-800 mb-6 leading-relaxed"></div>

                <div id="options-container" class="space-y-3"></div>

                <!-- Navegación -->
                <div class="flex justify-between mt-8 pt-6 border-t border-slate-100">
                    <button id="prev-btn" class="px-6 py-2 rounded-lg font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-30 transition-colors">
                        Anterior
                    </button>
                    <button id="next-btn" class="px-6 py-2 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 disabled:opacity-50 transition-all shadow-md active:transform active:scale-95">
                        Siguiente
                    </button>
                </div>
            </div>

            <!-- Interfaz de Resultados -->
            <div id="results-ui" class="hidden text-center py-8">
                <h2 class="text-3xl font-black text-slate-900 mb-2">RESULTADOS</h2>
                <p class="text-slate-500 mb-8 font-medium">Evaluación de Tecnologías de Red Local</p>
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="p-4 bg-green-50 rounded-xl border border-green-100 shadow-sm">
                        <div id="res-correct" class="text-3xl font-black text-green-600">0</div>
                        <div class="text-[10px] text-green-700 uppercase font-black tracking-tighter">Correctas</div>
                    </div>
                    <div class="p-4 bg-red-50 rounded-xl border border-red-100 shadow-sm">
                        <div id="res-incorrect" class="text-3xl font-black text-red-600">0</div>
                        <div class="text-[10px] text-red-700 uppercase font-black tracking-tighter">Incorrectas</div>
                    </div>
                    <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 shadow-sm">
                        <div id="res-empty" class="text-3xl font-black text-amber-600">0</div>
                        <div class="text-[10px] text-amber-700 uppercase font-black tracking-tighter">Omitidas</div>
                    </div>
                </div>
                <button onclick="resetQuiz()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black hover:bg-black transition-all shadow-lg uppercase tracking-widest">
                    Reiniciar Evaluación
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. ¿Cuál de las siguientes tecnologías sigue las especificaciones del IEEE 802.11?", a: ["Bluetooth", "LAN cableadas.", "LAN inalámbricas.", "ZigBee"], c: 2 },
            { q: "2. Indique cuál de las siguientes afirmaciones sobre ETHERNET es FALSA:", a: ["Es regulado por el estándar 802.3.", "Utiliza como protocolo de acceso al medio CSMA/CD.", "El modo en que las tramas de ETHERNET son puestas en el medio físico depende del hardware y cableado.", "En Ethernet solo se recomienda utilizar como medio de transmisión cables tipo UTP."], c: 3 },
            { q: "3. Si utilizamos la norma 100BaseTX, ¿qué tipo de medio de transmisión podemos utilizar?", a: ["2 pares STP categoría 5.", "4 pares UTP categoría 3 a 5.", "2 pares STP categoría 5 o 2 pares UTP categoría 5.", "2 pares UTP categoría 5."], c: 2 },
            { q: "4. ¿En qué tipo de topología de red las estaciones se conectan entre sí a través de un nodo que ocupa la posición central?", a: ["Topología en bus.", "Topología en estrella.", "En ninguna.", "Topología en anillo."], c: 1 },
            { q: "5. ¿Cómo se llaman los paquetes que utiliza el protocolo STP para evitar bucles en la red?", a: ["SPDUs (Switch Protol Data Units)", "BPDUs (Bridge Protocol Data Units)", "LPDUs (Loop Protocol Data Units)", "TPDUs (Topology Protocol Data Units)"], c: 1 },
            { q: "6. ¿Qué norma de la IEEE define las redes tipo Token Ring?", a: ["IEEE 802.3", "IEEE 802.4", "IEEE 802.5", "IEEE 802.2"], c: 2 },
            { q: "7. ¿Cuál es la velocidad de transmisión de datos para 1000BaseT?", a: ["100 Mbps", "1000 Mbps", "10 Gbps", "10 Mbps"], c: 1 },
            { q: "8. El protocolo CSMA/CD se utiliza para:", a: ["Encaminar paquetes en la red.", "Evitar colisiones en redes inalámbricas.", "Detectar y gestionar colisiones en redes Ethernet.", "Asignar direcciones IP."], c: 2 },
            { q: "9. ¿Qué dispositivo trabaja principalmente en la Capa 2 (Enlace de datos) y utiliza la dirección MAC para reenviar tramas?", a: ["Hub", "Router", "Switch", "Repetidor"], c: 2 },
            { q: "10. ¿Cuál es el estándar para redes inalámbricas de área personal (WPAN) como Bluetooth?", a: ["802.11", "802.15", "802.16", "802.3"], c: 1 },
            { q: "11. En una topología en Bus, si el cable principal se rompe:", a: ["Solo se detiene la comunicación del nodo afectado.", "La red sigue funcionando normalmente.", "Toda la red deja de funcionar.", "Se activa automáticamente un nodo de respaldo."], c: 2 },
            { q: "12. ¿Qué significa el término Full-Duplex en una conexión Ethernet?", a: ["La comunicación es en un solo sentido.", "Se puede enviar y recibir datos simultáneamente.", "Solo un dispositivo puede hablar a la vez.", "La velocidad se divide por dos."], c: 1 },
            { q: "13. ¿Cuál es la principal ventaja de un Switch frente a un Hub?", a: ["Es más barato.", "Divide la red en dominios de colisión independientes por puerto.", "Funciona sin electricidad.", "No necesita cables."], c: 1 },
            { q: "14. El estándar 802.3u corresponde a:", a: ["Gigabit Ethernet", "10BaseT", "Fast Ethernet (100 Mbps)", "Fibra óptica"], c: 2 },
            { q: "15. ¿Qué protocolo se encarga de resolver la dirección MAC a partir de una dirección IP?", a: ["DNS", "DHCP", "ARP", "ICMP"], c: 2 },
            { q: "16. ¿Qué tipo de cable utiliza el estándar 10Base5?", a: ["Cable coaxial fino.", "Cable de par trenzado.", "Fibra óptica.", "Cable coaxial grueso (Thicknet)."], c: 3 },
            { q: "17. El método de conmutación 'Store-and-Forward' en un switch:", a: ["Reenvía la trama en cuanto recibe la dirección de destino.", "Descarta todas las tramas.", "Recibe la trama completa y verifica el error (FCS) antes de reenviarla.", "Solo funciona con Hubs."], c: 2 },
            { q: "18. ¿Cuál es la longitud máxima de un segmento de cable UTP en Ethernet 100BaseTX?", a: ["500 metros", "100 metros", "185 metros", "2000 metros"], c: 1 },
            { q: "19. El direccionamiento físico de una tarjeta de red se conoce como:", a: ["Dirección IP", "Dirección MAC", "Dirección de Puerto", "Dirección DNS"], c: 1 },
            { q: "20. Una VLAN (Virtual LAN) permite:", a: ["Aumentar la velocidad del cable.", "Agrupar dispositivos lógicamente independientemente de su ubicación física.", "Eliminar la necesidad de routers.", "Conectar la red a internet sin módem."], c: 1 },
            { q: "21. El estándar IEEE 802.3ab define:", a: ["1000Base-SX", "1000Base-T (Gigabit sobre cobre)", "10Base-T", "Token Ring"], c: 1 },
            { q: "22. ¿Cuál es el tamaño de una dirección MAC?", a: ["32 bits", "64 bits", "48 bits (6 bytes)", "128 bits"], c: 2 },
            { q: "23. En el modelo OSI, ¿en qué capa operan los Routers?", a: ["Capa 1 (Física)", "Capa 2 (Enlace)", "Capa 3 (Red)", "Capa 4 (Transporte)"], c: 2 },
            { q: "24. El método de acceso CSMA/CA (Collision Avoidance) es típico de:", a: ["Ethernet por cable.", "Redes Wi-Fi (802.11).", "Fibra óptica.", "Bluetooth."], c: 1 },
            { q: "25. ¿Qué dispositivo de interconexión se utiliza para unir dos segmentos de red que usan protocolos distintos en la capa física pero el mismo en la capa de enlace?", a: ["Repetidor", "Bridge (Puente)", "Hub", "Transceiver"], c: 1 },
            { q: "26. ¿Cuál es la función del campo Preámbulo en una trama Ethernet?", a: ["Indicar el final de la trama.", "Sincronizar los relojes del emisor y el receptor.", "Contener la dirección IP.", "Cifrar los datos."], c: 1 },
            { q: "27. Un dominio de Broadcast se limita mediante el uso de:", a: ["Hubs", "Switches", "Routers o VLANs", "Cables cruzados"], c: 2 },
            { q: "28. ¿Cuál de las siguientes afirmaciones sobre la dirección MAC es verdadera?", a: ["Se implementan mediante software.", "Los primeros tres bytes corresponden al OUI (identificador del fabricante).", "Solo se necesitan en WAN.", "La ISO regula las direcciones MAC."], c: 1 },
            { q: "29. Señale la afirmación INCORRECTA en relación a los bridges:", a: ["No permite la unión de distintos tipos de medios de transmisión.", "Separan dominios de colisión.", "Dividen la red local en varios segmentos.", "Operan en la capa 2 del modelo OSI."], c: 0 },
            { q: "30. ¿Qué protocolo define las VLAN?", a: ["RFC 802.2", "IEEE 802.3u", "IEEE 802.11", "IEEE 802.1q"], c: 3 },
            { q: "31. El tamaño de trama mínimo en Ethernet es:", a: ["24 bytes", "48 bytes", "64 bytes", "128 bytes"], c: 2 },
            { q: "32. ¿Cuál de las siguientes afirmaciones es INCORRECTA?", a: ["La conexión entre switches VLAN y router suele ser de baja capacidad.", "Normalmente, cada VLAN se corresponde con una subred.", "Las VLANs son dominios de broadcast separados.", "La comunicación entre VLANs se hace a través de un router."], c: 0 }
        ];

        let currentIdx = 0;
        let answers = JSON.parse(localStorage.getItem('testAnswers_T10')) || {};

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-number').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl border-2 border-slate-200 option-transition hover:border-emerald-400 hover:bg-emerald-50 font-medium text-slate-700';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${option}`;
                
                if (answers[currentIdx] !== undefined) {
                    btn.classList.add('disabled');
                    if (i === data.c) btn.classList.add('correct');
                    else if (i === answers[currentIdx]) btn.classList.add('incorrect');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? "Ver Resultados" : "Siguiente";
            updateScore();
        }

        function selectOption(index) {
            if (answers[currentIdx] !== undefined) return;
            answers[currentIdx] = index;
            localStorage.setItem('testAnswers_T10', JSON.stringify(answers));
            loadQuestion();
        }

        function updateScore() {
            let correctCount = 0;
            Object.keys(answers).forEach(key => {
                if (answers[key] === quizData[key].c) correctCount++;
            });
            document.getElementById('score-live').innerText = `Aciertos: ${correctCount}`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx >= quizData.length) showResults();
            else if (currentIdx < 0) currentIdx = 0;
            else loadQuestion();
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            
            let correct = 0, incorrect = 0, empty = 0;
            quizData.forEach((d, i) => {
                if (answers[i] === undefined) empty++;
                else if (answers[i] === d.c) correct++;
                else incorrect++;
            });

            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-incorrect').innerText = incorrect;
            document.getElementById('res-empty').innerText = empty;
        }

        function resetQuiz() {
            localStorage.removeItem('testAnswers_T10');
            answers = {};
            currentIdx = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('results-ui').classList.add('hidden');
            loadQuestion();
        }

        document.getElementById('prev-btn').onclick = () => changeQuestion(-1);
        document.getElementById('next-btn').onclick = () => changeQuestion(1);

        loadQuestion();
    </script>
</body>
</html>
